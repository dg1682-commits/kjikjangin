<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식 시장 통제실 & 운영자 선물 센터</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .admin-box { background: #1e293b; padding: 20px; border-radius: 12px; margin-top: 30px; border: 2px solid #a855f7; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
        select, input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
        .stock-card { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #06b6d4; text-align: left; }
    </style>
</head>
<body>
    <h1>📈 주식 시장 통제실 & 운영자 센터</h1>
    <div id="timer-display">동기화 중...</div>
    <div class="grid" id="market-list"></div>

    <div class="admin-box">
        <h2 style="color: #a855f7;">🎁 운영자 선물 전송</h2>
        <select id="user-select"><option value="">유저 선택 중...</option></select>
        <select id="item-select">
            <option value="money">현금(원)</option>
            <option value="stamina">컨디션(수치)</option>
            <option value="nickname">닉네임 변경권</option>
        </select>
        <input type="number" id="reward-qty" placeholder="수량">
        <button onclick="sendGift()" style="background:#a855f7; color:white; font-weight:bold;">선물 전송</button>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 유저 리스트 로드
    async function loadUserList() {
        const select = document.getElementById('user-select');
        const snapshot = await db.collection("users").get();
        select.innerHTML = '<option value="">유저 선택</option>';
        snapshot.forEach(doc => {
            const data = doc.data();
            select.innerHTML += `<option value="${doc.id}">${data.nickname || '익명'} (${doc.id.substring(0,6)})</option>`;
        });
    }

    // 🚨 선물 전송 핵심 함수
    async function sendGift() {
        const uid = document.getElementById('user-select').value;
        const itemType = document.getElementById('item-select').value;
        const qty = parseInt(document.getElementById('reward-qty').value);
        
        if (!uid || !qty) return alert("유저와 수량을 정확히 선택하세요!");

        let mail = {
            title: "운영자의 특별 선물",
            rewardText: `${itemType === 'money' ? qty.toLocaleString()+'원' : itemType === 'stamina' ? '컨디션 '+qty : '닉네임 변경권 '+qty+'개'}`,
            item: itemType === 'nickname' ? 'nickname' : 'etc',
            amount: qty
        };

        await db.collection("users").doc(uid).update({
            inbox: firebase.firestore.FieldValue.arrayUnion(mail)
        });
        
        alert("선물을 성공적으로 보냈습니다!");
    }

    // ... 기존 주식 로직 동일 (initMarket, updateMarket 등) ...
    // (이전 코드의 시장 동기화 및 갱신 로직을 그대로 사용하세요)
    
    // 시스템 기동
    initMarket();
    loadUserList();
</script>
</body>
</html>
