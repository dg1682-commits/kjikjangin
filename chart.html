<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식 시장 통제실 (마스터 제어 센터)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; padding-bottom: 60px; }
        #timer-display { font-size: 24px; color: #fbbf24; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .stock-card { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #06b6d4; text-align: left; }
        .stock-card h3 { margin: 0 0 10px 0; font-size: 18px; color: #f1f5f9; }
        .stock-card p { margin: 0 0 15px 0; font-size: 20px; font-weight: bold; color: #38bdf8; }
        
        .control-group { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .step-btn { background: #475569; color: white; border: none; border-radius: 5px; width: 32px; height: 32px; font-size: 18px; font-weight: bold; cursor: pointer; }
        input[type="number"], select, textarea { border-radius: 5px; border: none; background: #334155; color: white; font-weight: bold; box-sizing: border-box; }
        input[type="number"] { width: 60px; height: 32px; text-align: center; }
        .apply-btn { height: 32px; padding: 0 12px; background: #0ea5e9; color: white; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; margin-left: auto; }

        .pending-container { margin-top: 30px; padding: 20px; background: #1e293b; border-radius: 12px; text-align: left; border-left: 5px solid #f43f5e; max-width: 600px; margin-left: auto; margin-right: auto; }
        .pending-title { margin-top: 0; color: #f43f5e; font-size: 18px; }
        .pending-list { list-style: none; padding: 0; margin: 0; color: #cbd5e1; font-weight: bold; }
        .pending-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #334155; display: flex; justify-content: space-between; }

        .news-maker-box { margin-top: 30px; padding: 25px; background: #1e293b; border-radius: 12px; text-align: left; border-left: 5px solid #a855f7; max-width: 600px; margin-left: auto; margin-right: auto; }
        .news-flex-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .news-select { flex: 1; height: 42px; padding: 0 10px; font-size: 14px; cursor: pointer; }
        .news-btn { height: 42px; background: #a855f7; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; transition: opacity 0.1s; }
        .news-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <h1>📈 주식 시장 통제실 (마스터 제어 센터)</h1>
    
    <div id="active-news-status"></div>
    <div id="timer-display">글로벌 연대 동기화 중...</div>
    
    <div class="grid" id="market-list"></div>

    <div class="pending-container">
        <h3 class="pending-title">⚠️ 다음 턴 적용 대기열</h3>
        <ul id="pending-list" class="pending-list"><li>대기 중인 조정 내역이 없습니다.</li></ul>
    </div>

    <div class="news-maker-box">
        <h3 style="margin-top:0; color:#a855f7; font-size:18px;">📰 실시간 속보 뉴스 메이커 (5턴 트렌드 제어)</h3>
        <div class="news-flex-row">
            <select id="news-stock-select" class="news-select">
                <option value="">영향을 줄 종목 선택</option>
            </select>
            <select id="news-type-select" class="news-select" style="max-width: 150px;">
                <option value="up">📈 호재 (폭등)</option>
                <option value="down">📉 악재 (폭락)</option>
            </select>
            <button class="news-btn" style="padding: 0 16px;" onclick="generateNewsDraft()">기사 초안 작성</button>
        </div>
        
        <textarea id="news-textarea" placeholder="여기에 자동 생성된 보도 기사가 채워집니다. 직접 수정도 가능합니다." style="width:100%; height:100px; padding:12px; font-size:14px; line-height:1.5; margin-bottom:15px; resize: none;"></textarea>
        <button class="news-btn" style="width:100%; background: #10b981; height: 45px; font-size: 15px;" onclick="submitNewsFlash()">📰 속보 전송 및 5턴 트렌드 가속 강제 주입</button>
    </div>
    <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #334155; display: flex; gap: 10px;">
        <button class="news-btn" style="flex: 1; background: #64748b; height: 35px; font-size: 13px;" onclick="expireAllPastNews()">⏳ 이전 뉴스 일괄 취소선(만료) 처리</button>
        <button class="news-btn" style="flex: 1; background: #ef4444; height: 35px; font-size: 13px;" onclick="deleteAllNews()">🗑️ 뉴스룸 전체 기사 비우기 (초기화)</button>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const stocks = [
        { id: "nvda", name: "애비디아", price: 353189 }, { id: "aapl", name: "파인애플", price: 446539 },
        { id: "tsla", name: "테슐라", price: 664130 }, { id: "brk", name: "요크셔 했어웨이", price: 1089420000 },
        { id: "nbr", name: "NBR", price: 8510000 }, { id: "shib", name: "시바보드", price: 7050000 },
        { id: "hdo", name: "효도중공업", price: 4600000 }, { id: "skh", name: "SK바이닉스", price: 1864000 },
        { id: "hanwha", name: "하놔에어로스페이스", price: 1315000 }, { id: "sec", name: "사성전기", price: 982000 },
        { id: "mirae", name: "미래차", price: 756000 }, { id: "hanmi", name: "한미중반도체", price: 409500 },
        { id: "os", name: "오성전자", price: 277000 }, { id: "cocoa", name: "코코아", price: 92400 },
        { id: "sksec", name: "OK증권", price: 1250 }
    ];

    let lastMarketUpdate = Date.now();
    let globalActiveNews = null;
    let pendingPercents = {};
    let localDraftNews = null; 

    function stepValue(id, delta) {
        const inputEl = document.getElementById(`input-${id}`);
        inputEl.value = (parseFloat(inputEl.value) || 0) + delta;
    }

    function renderPendingList() {
        const listEl = document.getElementById('pending-list');
        if (!listEl) return;
        let html = "";
        let has = false;
        for (let id in pendingPercents) {
            if (pendingPercents[id] !== undefined) {
                has = true;
                let s = stocks.find(x => x.id === id);
                let p = (pendingPercents[id] * 100).toFixed(2);
                html += `<li class="pending-item"><span>${s.name}</span> <span>${p > 0 ? '+' : ''}${p}% 적용 대기</span></li>`;
            }
        }
        listEl.innerHTML = has ? html : "<li>대기 중인 조정 내역이 없습니다.</li>";
    }

    function applyManualPercent(id) {
        let val = document.getElementById(`input-${id}`).value;
        if (!val) return;
        pendingPercents[id] = parseFloat(val) / 100;
        document.getElementById(`input-${id}`).value = "";
        renderPendingList();
    }

    function renderActiveNewsUI(activeNews) {
        const container = document.getElementById('active-news-status');
        if (!container) return;
        if (activeNews && activeNews.turnsLeft > 0) {
            let s = stocks.find(x => x.id === activeNews.stockId);
            container.innerHTML = `
                <div style="background: ${activeNews.type === 'up' ? '#10b981' : '#ef4444'}; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; font-size:15px; color:#fff;">
                    📢 현재 전 유저 강제 적용 중인 특보: [${s ? s.name : activeNews.stockId}] (${activeNews.type === 'up' ? '호재 폭등 폭풍 버프' : '악재 디버프 대폭락'}) - 잔여 가속: ${activeNews.turnsLeft}턴 남음
                </div>`;
        } else {
            container.innerHTML = `
                <div style="background: #334155; padding: 12px; border-radius: 8px; color: #94a3b8; font-weight: bold; margin-bottom: 20px; font-size:14px;">
                    📭 활성화된 글로벌 뉴스 특보가 없습니다. (일반 인공지능 자율 시장 모드)
                </div>`;
        }
    }

    function generateNewsDraft() {
        const stockId = document.getElementById('news-stock-select').value;
        const type = document.getElementById('news-type-select').value;
        if(!stockId) return alert("버프/디버프를 부여할 종목을 먼저 선택해주세요!");
        
        let s = stocks.find(x => x.id === stockId);
        const upTemplates = [
            `[속보]외신 보도에 따르면 글로벌 유통 대기업이 ${s.name}의 독점 기술 부품을 향후 3년간 전량 선방영 수급 계약을 체결했다는 특보가 타전되었습니다. 이로 인해 강력한 실적 우상향 대폭등 모멘텀이 기대됩니다.`,
            `[특보]${s.name}이 예상을 뛰어넘는 초격차 신제품 혁신에 대성공하며 북미 시장 점유율 1위를 탈환했습니다. 해외 기관 투자자들의 공격적인 자금 유입으로 인해 대규모 우상향 가속 선이 포착되었습니다.`
        ];
        const downTemplates = [
            `[공지]${s.name}의 핵심 원자재 공급망에 예기치 못한 차질이 생기며 공장 가동률이 40% 이하로 급감했습니다. 이번 분기 실적이 반토막 날 것이라는 내부 기밀 보고서가 유출되어 매도 물량이 쏟아지고 있습니다.`,
            `[경고]글로벌 시장 규제 위원회가 ${s.name}의 주력 유통 사업 부문에 사상 최대 규모의 반독점 규제 과징금을 전격 예고했습니다. 미래 성장성에 심각한 급브레이크가 걸리며 투자 심리가 급격히 냉각 중입니다.`
        ];
        
        let pool = type === 'up' ? upTemplates : downTemplates;
        let selectedText = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('news-textarea').value = selectedText;
        
        localDraftNews = { stockId: stockId, type: type, turnsLeft: 5, text: selectedText };
    }

    async function submitNewsFlash() {
        if (window.isNewsSubmitting) return; 
        if (!localDraftNews || document.getElementById('news-textarea').value.trim() === "") {
            return alert("먼저 기사 초안 작성 버튼을 눌러 뉴스 내용을 생성해주세요!");
        }
        
        localDraftNews.text = document.getElementById('news-textarea').value.trim();
        let s = stocks.find(x => x.id === localDraftNews.stockId);
        if (!confirm(`[${s.name}] 종목의 주가를 향후 5턴 동안 폭등/폭락시킬 속보 뉴스를 발행하시겠습니까?`)) return;

        try {
            window.isNewsSubmitting = true;
            let newsTimestamp = Date.now();
            localDraftNews.timestamp = newsTimestamp;
            localDraftNews.processedExpired = false; 

            let batch = db.batch();
            batch.set(db.collection("market_data").doc("market_status"), {
                lastUpdate: newsTimestamp, activeNews: localDraftNews
            }, { merge: true });

            batch.set(db.collection("market_data").doc("market_news"), {
                newsList: firebase.firestore.FieldValue.arrayUnion({
                    title: localDraftNews.type === 'up' ? `[특보] ${s.name} 호재 발생` : `[쇼크] ${s.name} 리스크 대두`,
                    rewardText: localDraftNews.type === 'up' ? "시장 지배력 모멘텀 확보" : "경영 실적 비상경영 체제 돌입",
                    timestamp: newsTimestamp, articleBody: localDraftNews.text, userName: "운영총괄팀", isExpired: false
                })
            }, { merge: true });

            await batch.commit();
            alert("📰 뉴스룸 특보 발행 완료! 즉시 실시간 연동됩니다.");
            document.getElementById('news-textarea').value = "";
            localDraftNews = null;
        } catch (e) { console.error(e); alert("전송 오류 발생"); } finally { window.isNewsSubmitting = false; }
    }

    async function expireAllPastNews() {
        if (!confirm("현재 뉴스룸에 올라와 있는 모든 기사에 취소선을 일괄 적용하시겠습니까?")) return;
        try {
            const newsDoc = await db.collection("market_data").doc("market_news").get();
            if (newsDoc.exists && newsDoc.data().newsList) {
                let list = newsDoc.data().newsList;
                list.forEach(n => n.isExpired = true);
                await db.collection("market_data").doc("market_news").set({ newsList: list }, { merge: true });
                alert("✅ 모든 과거 기사에 취소선이 정상 반영되었습니다!");
            } else { alert("정리할 기사가 없습니다."); }
        } catch (e) { console.error(e); alert("만료 처리 중 오류가 발생했습니다."); }
    }

    async function deleteAllNews() {
        if (!confirm("💥 진짜로 뉴스룸의 모든 기사를 흔적도 없이 삭제하시겠습니까?")) return;
        try {
            await db.collection("market_data").doc("market_news").set({ newsList: [] });
            alert("🗑️ 뉴스룸 데이터가 깨끗하게 초기화되었습니다!");
        } catch (e) { console.error(e); alert("데이터 초기화 중 오류가 발생했습니다."); }
    }

    // 🚨 [패치 핵심] 관리자 화면에도 유저창과 100% 동일한 실시간 전산 리스너 결성 연대 주입
    function listenGlobalMarketRealtime() {
        db.collection("market_data").onSnapshot(snapshot => {
            snapshot.forEach(doc => {
                if (doc.id === "market_status") {
                    let data = doc.data();
                    if (data && data.lastUpdate) {
                        lastMarketUpdate = data.lastUpdate;
                        globalActiveNews = data.activeNews || null;
                        renderActiveNewsUI(globalActiveNews);
                    }
                    return;
                }
                if (doc.id === "market_news") return;
                
                let data = doc.data();
                let s = stocks.find(x => x.id === doc.id);
                if (s) s.price = Number(data.price);
            });
            renderUI();
        });
    }

    async function initMarket() {
        const selectEl = document.getElementById('news-stock-select');
        selectEl.innerHTML = '<option value="">영향을 줄 종목 선택</option>';
        stocks.forEach(s => {
            selectEl.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
        
        listenGlobalMarketRealtime(); // 실시간 데이터 및 시간 감시망 활성화
        renderPendingList();
        setInterval(tick, 1000);
    }

    function tick() {
        let remaining = Math.max(0, Math.floor(((lastMarketUpdate + 90000) - Date.now()) / 1000));
        if (remaining <= 0) {
            updateMarket();
        } else {
            document.getElementById('timer-display').innerText = `다음 시장 변동까지: ${remaining}초 남음`;
        }
    }

    // 🚨 [2번 완치] 순차 처리를 철폐하고 15개 종목을 묶어서 단 1번에 쏘는 atomic writeBatch 시스템 도입
    async function updateMarket() {
        const now = Date.now();
        let elapsedMs = now - lastMarketUpdate;
        let missedTurns = Math.floor(elapsedMs / 90000);
        
        if (missedTurns < 1) return; // 유저 브라우저가 먼저 정산했다면 통제실은 중복 정산 생략 통과

        let batch = db.batch();

        for (let turn = 0; turn < missedTurns; turn++) {
            for (let s of stocks) {
                let change = 0;
                if (turn === 0 && pendingPercents[s.id] !== undefined) {
                    change = s.price * pendingPercents[s.id];
                } 
                else if (globalActiveNews && globalActiveNews.stockId === s.id && globalActiveNews.turnsLeft > 0) {
                    if (globalActiveNews.type === 'up') change = s.price * ((Math.random() * 0.05) + 0.01); 
                    else change = s.price * (-(Math.random() * 0.05) - 0.01); 
                } 
                else {
                    // 🚨 [3번 보존] 관리자 정산 시에도 동일하게 우상향 보정 공식 계수 할당
                    change = s.price * (Math.random() - 0.44) * 0.05;
                }
                s.price = Math.max(10, Math.floor(s.price + change));
            }
            
            if (turn === 0) {
                for (let s of stocks) pendingPercents[s.id] = undefined;
            }
            if (globalActiveNews && globalActiveNews.turnsLeft > 0) {
                globalActiveNews.turnsLeft--;
            }
        }

        // 🚨 15개 종목을 일제히 하나의 패키지에 추가
        stocks.forEach(s => {
            batch.set(db.collection("market_data").doc(s.id), { name: s.name, price: s.price });
        });

        let nextUpdateBase = lastMarketUpdate + (missedTurns * 90000);
        if (now - nextUpdateBase > 90000) nextUpdateBase = now;
        
        if (globalActiveNews && globalActiveNews.turnsLeft === 0 && !globalActiveNews.processedExpired) {
            try {
                globalActiveNews.processedExpired = true; 
                const newsDoc = await db.collection("market_data").doc("market_news").get();
                if (newsDoc.exists && newsDoc.data().newsList) {
                    let list = newsDoc.data().newsList;
                    list.forEach(n => {
                        if (Number(n.timestamp) === Number(globalActiveNews.timestamp)) n.isExpired = true;
                    });
                    batch.set(db.collection("market_data").doc("market_news"), { newsList: list }, { merge: true });
                }
            } catch (e) { console.error(e); }
        }

        // 🚨 글로벌 통합 마켓 시계까지 패키지에 합쳐 단 1번의 틱으로 전송 마감
        batch.set(db.collection("market_data").doc("market_status"), { 
            lastUpdate: nextUpdateBase, activeNews: globalActiveNews 
        });
        
        await batch.commit(); // 전선 배포 완료
        renderPendingList();
    }

    function renderUI() {
        document.getElementById('market-list').innerHTML = stocks.map(s => `
            <div class="stock-card">
                <h3>${s.name}</h3>
                <p>${s.price.toLocaleString()}원</p>
                <div class="control-group">
                    <button class="step-btn" onclick="stepValue('${s.id}', -1)">-</button>
                    <input type="number" id="input-${s.id}" placeholder="0">
                    <button class="step-btn" onclick="stepValue('${s.id}', 1)">+</button>
                    <button class="apply-btn" onclick="applyManualPercent('${s.id}')">적용</button>
                </div>
            </div>`).join('');
    }

    initMarket();
</script>
</body>
</html>
