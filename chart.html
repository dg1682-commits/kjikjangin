<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식 시장 통제실 (자율 구동)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        #timer-display { font-size: 24px; color: #fbbf24; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .stock-card { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #06b6d4; text-align: left; }
        .stock-card h3 { margin: 0 0 10px 0; font-size: 18px; color: #f1f5f9; }
        .stock-card p { margin: 0 0 15px 0; font-size: 20px; font-weight: bold; color: #38bdf8; }
        
        .control-group { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .step-btn { background: #475569; color: white; border: none; border-radius: 5px; width: 32px; height: 32px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .step-btn:active { background: #334155; transform: scale(0.95); }
        input[type="number"] { width: 60px; height: 32px; box-sizing: border-box; border-radius: 5px; border: none; background: #334155; color: white; text-align: center; font-weight: bold; font-size: 16px; }
        .apply-btn { height: 32px; padding: 0 12px; background: #0ea5e9; color: white; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; margin-left: auto; }
        .apply-btn:active { background: #0284c7; transform: scale(0.95); }

        /* [패치] 대기열 전광판 스타일 */
        .pending-container { margin-top: 40px; padding: 20px; background: #1e293b; border-radius: 12px; text-align: left; border-left: 5px solid #f43f5e; max-width: 600px; margin-left: auto; margin-right: auto; }
        .pending-title { margin-top: 0; color: #f43f5e; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .pending-list { list-style: none; padding: 0; margin: 0; color: #cbd5e1; font-weight: bold; font-size: 16px; }
        .pending-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed #334155; display: flex; justify-content: space-between; }
        .pending-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    </style>
</head>
<body>
    <h1>📈 주식 시장 통제실 (자율 구동)</h1>
    <div id="timer-display">서버 시간 동기화 중...</div>
    <div class="grid" id="market-list"></div>

    <div class="pending-container">
        <h3 class="pending-title">⚠️ 다음 턴 적용 대기열 (0초 반영)</h3>
        <ul id="pending-list" class="pending-list">
            <li>대기 중인 조정 내역이 없습니다.</li>
        </ul>
    </div>

    <div style="margin-top: 50px; padding: 20px; border-top: 1px solid #334155; color: #64748b; font-size: 12px;">
        <p>마지막 업데이트 배포 시간: <span id="deploy-time">확인 중...</span></p>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", 
        authDomain: "kkkjikjang.firebaseapp.com", 
        projectId: "kkkjikjang", 
        storageBucket: "kkkjikjang.firebasestorage.app", 
        messagingSenderId: "138250223666", 
        appId: "1:138250223666:web:997b7ed4572f717354fc2b" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const stocks = [
        { id: "nvda", name: "애비디아", price: 353189 }, 
        { id: "aapl", name: "파인애플", price: 446539 },
        { id: "tsla", name: "테슐라", price: 664130 }, 
        { id: "brk", name: "요크셔 했어웨이", price: 1089420000 },
        { id: "nbr", name: "NBR", price: 8510000 }, 
        { id: "shib", name: "시바보드", price: 7050000 },
        { id: "hdo", name: "효도중공업", price: 4600000 }, 
        { id: "skh", name: "SK바이닉스", price: 1864000 },
        { id: "hanwha", name: "하놔에어로스페이스", price: 1315000 }, 
        { id: "sec", name: "사성전기", price: 982000 },
        { id: "mirae", name: "미래차", price: 756000 }, 
        { id: "hanmi", name: "한미중반도체", price: 409500 },
        { id: "os", name: "오성전자", price: 277000 }, 
        { id: "cocoa", name: "코코아", price: 92400 },
        { id: "sksec", name: "OK증권", price: 1250 }
    ];

    let targetTime = 0;
    let isUpdating = false;
    let pendingPercents = {};

    function stepValue(id, delta) {
        const inputEl = document.getElementById(`input-${id}`);
        let currentVal = parseFloat(inputEl.value) || 0;
        inputEl.value = currentVal + delta;
    }

    // 🚨 [패치] 대기열 리스트를 화면에 그려주는 함수
    function renderPendingList() {
        const listEl = document.getElementById('pending-list');
        if (!listEl) return;

        let html = "";
        let hasPending = false;

        for (let id in pendingPercents) {
            if (pendingPercents[id] !== undefined) {
                hasPending = true;
                let stock = stocks.find(s => s.id === id);
                let percent = (pendingPercents[id] * 100).toFixed(2);
                let color = percent > 0 ? '#ef4444' : '#3b82f6';
                let sign = percent > 0 ? '+' : '';
                
                html += `
                    <li class="pending-item">
                        <span>${stock.name}</span> 
                        <span style="color: ${color};">${sign}${parseFloat(percent)}% 적용 대기</span>
                    </li>`;
            }
        }

        if (!hasPending) {
            listEl.innerHTML = "<li>대기 중인 조정 내역이 없습니다.</li>";
        } else {
            listEl.innerHTML = html;
        }
    }

    function applyManualPercent(id, percentStr) {
        if (!percentStr || isNaN(percentStr)) {
            pendingPercents[id] = undefined;
            renderPendingList(); // 갱신
            return;
        }
        pendingPercents[id] = parseFloat(percentStr) / 100;
        
        document.getElementById(`input-${id}`).value = ""; 
        renderPendingList(); // 적용 버튼 누를 때마다 하단 리스트 갱신
    }

    async function initMarket() {
        try {
            const snapshot = await db.collection("market_data").get();
            snapshot.forEach(doc => {
                if (doc.id !== "market_status") {
                    let s = stocks.find(st => st.id === doc.id);
                    if (s && doc.data().price) s.price = Number(doc.data().price);
                }
            });

            const statusDoc = await db.collection("market_data").doc("market_status").get();
            if (statusDoc.exists && statusDoc.data().lastUpdate) {
                let lastUpdate = statusDoc.data().lastUpdate;
                targetTime = lastUpdate + 90000;
            } else {
                let now = Date.now();
                await db.collection("market_data").doc("market_status").set({ lastUpdate: now });
                targetTime = now + 90000;
            }
            
            renderUI();
            renderPendingList();

            setInterval(tick, 1000);
            tick();
        } catch (error) {
            console.error("초기화 실패:", error);
            document.getElementById('timer-display').innerText = "❌ 파이어베이스 규칙(Rules) 확인 필요!";
            document.getElementById('timer-display').style.color = "#f43f5e";
        }
    }

    async function tick() {
        if (isUpdating || targetTime === 0) return;

        let now = Date.now();
        let remaining = Math.floor((targetTime - now) / 1000);
        const timerEl = document.getElementById('timer-display');
        
        if (remaining <= 0) {
            isUpdating = true;
            timerEl.innerText = `시장에 변동성 주는 중...`;
            await updateMarket();
        } else {
            timerEl.innerText = `다음 시장 변동까지: ${remaining}초 남음`;
        }
    }

    async function updateMarket() {
        const now = Date.now();
        try {
            await db.collection("market_data").doc("market_status").set({ lastUpdate: now });

            for (let s of stocks) {
                let change;
                if (pendingPercents[s.id] !== undefined) {
                    change = s.price * pendingPercents[s.id];
                    pendingPercents[s.id] = undefined; // 🚨 반영 후 메모리에서 삭제
                } else {
                    change = s.price * (Math.random() - 0.5) * 0.05;
                }

                s.price = Math.max(10, Math.floor(s.price + change));

                await db.collection("market_data").doc(s.id).set({
                    name: s.name, price: s.price, updatedAt: now
                });
                await db.collection("price_history").doc(s.id).collection("daily").doc(now.toString()).set({
                    price: s.price, date: new Date(now)
                });
            }
            
            targetTime = now + 90000;
            renderUI();
            renderPendingList(); // 🚨 시장 반영 끝났으니 대기열도 비움 처리
        } catch (error) {
            console.error("업데이트 에러:", error);
            targetTime = Date.now() + 5000; 
        } finally {
            isUpdating = false;
        }
    }

    function renderUI() {
        const listEl = document.getElementById('market-list');
        if (!listEl) return;
        
        listEl.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <h3>${s.name}</h3>
                <p>${s.price.toLocaleString()}원</p>
                <div class="control-group">
                    <button class="step-btn" onclick="stepValue('${s.id}', -1)">-</button>
                    <input type="number" id="input-${s.id}" placeholder="0">
                    <button class="step-btn" onclick="stepValue('${s.id}', 1)">+</button>
                    <span style="font-weight: bold; margin-left: 2px;">%</span>
                    <button class="apply-btn" onclick="applyManualPercent('${s.id}', document.getElementById('input-${s.id}').value)">적용</button>
                </div>
            </div>
        `).join('');
    }

    initMarket();

    document.getElementById('deploy-time').innerText = new Date().toLocaleString();
</script>
</body>
</html>
