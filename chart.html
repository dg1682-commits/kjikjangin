<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주식 시장 통제실</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        #timer-display { font-size: 24px; color: #fbbf24; margin-bottom: 20px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .stock-card { background: #1e293b; padding: 20px; border-radius: 12px; border-left: 5px solid #06b6d4; }
        input { width: 80px; padding: 8px; border-radius: 5px; border: none; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>📈 주식 시장 통제실</h1>
    <div id="timer-display">다음 시장 변동까지: 90초 남음</div>
    <div class="grid" id="market-list"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const stocks = [
        { id: "nvda", name: "애비디아", price: 353189 }, { id: "aapl", name: "파인애플", price: 446539 },
        { id: "tsla", name: "테슐라", price: 664130 }, { id: "brk", name: "요크셔 했어웨이", price: 1089420000 },
        { id: "nbr", name: "NBR", price: 8510000 }, { id: "shib", name: "시바보드", price: 7050000 },
        { id: "hdo", name: "효도중공업", price: 4600000 }, { id: "skh", name: "SK바이닉스", price: 1864000 },
        { id: "hanwha", name: "하놔에어로스페이스", price: 1315000 }, { id: "sec", name: "사성전기", price: 982000 },
        { id: "mirae", name: "미래차", price: 756000 }, { id: "hanmi", name: "한미중반도체", price: 409500 },
        { id: "os", name: "오성전자", price: 277000 }, { id: "cocoa", name: "코코아", price: 92400 },
        { id: "sksec", name: "OK증권", price: 1250 }
    ];

    let timeLeft = 90;
    let pendingPercents = {};

    function applyManualPercent(id, percentStr) {
        pendingPercents[id] = parseFloat(percentStr) / 100;
        alert(`${id} 종목을 ${percentStr}% 조정 대기중!`);
    }

async function initMarket() {
    const doc = await db.collection("market_data").doc("market_status").get();
    let lastUpdate = doc.exists ? doc.data().lastUpdate : 0;
    
    let now = Date.now();
    let elapsed = now - lastUpdate;

    if (elapsed >= 90000) {
        // 90초 이상 지났으면 즉시 업데이트
        updateMarket();
    } else {
        // 아직 시간이 안 됐으면 남은 시간만큼만 대기
        timeLeft = Math.floor((90000 - elapsed) / 1000);
        setTimeout(updateMarket, 90000 - elapsed);
    }
}

async function updateMarket() {
    const now = Date.now();
    
    // 1. 마지막 업데이트 시간 Firebase에 저장
    db.collection("market_data").doc("market_status").set({ lastUpdate: now });

    // 2. 종목별 가격 갱신 (기존 로직 동일)
    for (let s of stocks) {
        let change = (pendingPercents[s.id] !== undefined) ? 
                     s.price * pendingPercents[s.id] : 
                     s.price * (Math.random() - 0.5) * 0.05;
        
        s.price = Math.max(10, Math.floor(s.price + change));
        pendingPercents[s.id] = undefined;
        // ... (이후 시장 데이터 저장 로직 동일)
    }
    
    renderUI();
    // 90초 루프 재시작
    setTimeout(updateMarket, 90000);
    timeLeft = 90;
}

    function renderUI() {
        document.getElementById('market-list').innerHTML = stocks.map(s => `
            <div class="stock-card">
                <h3>${s.name}</h3>
                <p style="font-size: 18px; font-weight:bold;">${s.price.toLocaleString()}원</p>
                <input type="number" placeholder="예: 5" onchange="applyManualPercent('${s.id}', this.value)"> %
            </div>
        `).join('');
    }
    
    // 타이머 및 갱신 루프
    setInterval(() => {
        timeLeft--;
        if (timeLeft >= 0) document.getElementById('timer-display').innerText = `다음 시장 변동까지: ${timeLeft}초 남음`;
    }, 1000);
    
    updateMarket();
    setInterval(updateMarket, 90000);
</script>
</body>
</html>
