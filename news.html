<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 신문 - 뉴스룸</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --news-bg: #f4f6f9;
            --paper-white: #ffffff;
            --ink-black: #0f172a;
            --ink-gray: #334155;
            --ink-muted: #64748b;
            --border-line: #cbd5e1;
            --breaking-red: #dc2626;
            --accent-blue: #1d4ed8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%; 
            font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
            background-color: var(--news-bg);
            color: var(--ink-black);
        }

        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: var(--paper-white); 
            border-bottom: 2px solid var(--ink-black); 
            z-index: 100; 
        }
        .back-btn { font-size: 24px; font-weight: bold; color: var(--ink-black); cursor: pointer; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
        .empty-space { width: 24px; }

        main { 
            padding-top: 75px; padding-bottom: 50px; 
            max-width: 640px; margin: 0 auto; padding-left: 14px; padding-right: 14px;
            overflow-y: auto; height: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .breaking-banner {
            background: var(--breaking-red); color: #ffffff; border-radius: 8px;
            padding: 11px 15px; margin-bottom: 20px; font-size: 13px; font-weight: 800;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.15);
        }
        .breaking-tag { background: #ffffff; color: var(--breaking-red); padding: 2px 6px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }

        .news-article-card {
            background: var(--paper-white); border: 1px solid var(--border-line);
            border-radius: 12px; padding: 22px 20px; margin-bottom: 18px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .article-meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-muted); font-weight: 700; margin-bottom: 8px; }
        .article-cat { color: var(--accent-blue); }
        .article-dot { color: var(--border-line); }
        .article-headline { font-size: 19px; font-weight: 800; line-height: 1.45; color: var(--ink-black); margin: 0 0 12px 0; letter-spacing: -0.5px; }
        .article-journalist { font-size: 12px; color: var(--ink-gray); font-weight: 600; background: #f1f5f9; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 14px; }
        .article-body-text { font-size: 14px; line-height: 1.65; color: var(--ink-gray); font-weight: 500; text-align: justify; word-break: break-all; }
        .article-body-text p { margin: 0 0 12px 0; }
    </style>
</head>
<body>

    <header>
        <a href="main.html" class="back-btn">←</a>
        <div class="header-title">THE K-WORKER TIMES</div>
        <div class="empty-space"></div>
    </header>

    <main>
        <div class="breaking-banner">
            <span class="breaking-tag">⚡ 속보</span>
            <div id="breaking-text" style="flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">
                시장의 새로운 속보 뉴스를 기다리는 중입니다...
            </div>
        </div>

        <div id="news-stream-container">
            <div style="text-align:center; padding:40px; color:var(--ink-muted); font-weight:bold;">뉴스룸 기사를 불러오는 중...</div>
        </div>
    </main>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function listenLiveNewsRoom() {
        // 규칙 예외 처리가 확보된 통합 경로 실시간 감시 시동
        db.collection("market_data").doc("market_news").onSnapshot(doc => {
            const container = document.getElementById('news-stream-container');
            if (!container) return;

            if (!doc.exists || !doc.data().newsList || doc.data().newsList.length === 0) {
                container.innerHTML = `
                <div class="news-article-card">
                    <div class="article-meta"><span class="article-cat">[안내]</span><span class="article-dot">|</span><span class="article-date">방금 전</span></div>
                    <h2 class="article-headline">현재 발행된 사내 특보 기사가 존재하지 않습니다.</h2>
                    <div class="article-journalist">문화부 기자</div>
                    <div class="article-body-text">통제실 제어 장치를 통해 실시간 가속 뉴스를 송출하면 이 자리에 실시간 속보 헤드라인이 즉시 마운트됩니다.</div>
                </div>`;
                return;
            }

            let newsList = doc.data().newsList;
            // 최신 등록순 정렬 연산
            newsList.sort((a, b) => b.timestamp - a.timestamp);

            let html = "";
            newsList.forEach(data => {
                const timeString = new Date(data.timestamp).toLocaleString('ko-KR', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', hour12: false
                });

                html += `
                <div class="news-article-card">
                    <div class="article-meta">
                        <span class="article-cat">${data.rewardText || '[시황 소식]'}</span>
                        <span class="article-dot">|</span>
                        <span class="article-date">${timeString}</span>
                    </div>
                    <h2 class="article-headline">${data.title}</h2>
                    <div class="article-journalist">${data.userName || '운영총괄팀'} 기자</div>
                    <div class="article-body-text">
                        <p>${data.articleBody ? data.articleBody.replace(/\n/g, '<br>') : '본문 내용이 없는 속보입니다.'}</p>
                    </div>
                </div>`;
            });

            container.innerHTML = html;

            // 상단 실시간 전광판 텍스트 동기화
            if(newsList[0]) {
                const latestNews = newsList[0];
                document.getElementById('breaking-text').innerText = latestNews.title + " - " + latestNews.articleBody.substring(0, 40) + "...";
            }

        }, err => {
            console.error("뉴스룸 데이터 스트림 미러링 장해:", err);
        });
    }

    listenLiveNewsRoom();
</script>
</body>
</html>
