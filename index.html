<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --condition-color: #f43f5e;
            --premium-blue: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
        }

        button { cursor: pointer; border: none; border-radius: 12px; font-weight: 600; }

        /* [1] 로그인 섹션 */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center;
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; }
        .slogan { font-size: 14px; color: var(--text-sub); margin-bottom: 50px; }
        #start-btn {
            width: 100%; max-width: 300px; padding: 18px;
            background: var(--accent-color); color: var(--bg-color);
            font-size: 18px; transition: transform 0.1s;
        }
        #start-btn:active { transform: scale(0.95); }

        /* [2] 메인 게임 섹션 */
        #game-screen { display: none; height: 100%; position: relative; }

        /* 상단 헤더 */
        header {
            position: absolute; top: 0; width: 100%;
            padding: 12px 15px; display: flex; justify-content: space-between; gap: 10px;
            background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid #334155;
            z-index: 10;
        }
        .header-left { display: flex; flex-direction: column; gap: 5px; width: 55%; justify-content: center; flex-shrink: 0; }
        
        .rank-badge {
            background: var(--accent-color); color: var(--bg-color);
            padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: 800;
            white-space: nowrap; display: inline-block;
        }
        
        .stat-row { display: flex; align-items: center; gap: 4px; width: 100%; }
        
        .stat-label-left { 
            font-size: 12px; font-weight: 800; color: var(--text-main); 
            width: 42px; flex-shrink: 0; text-align: left; 
        }

        .bar-container { 
            position: relative; 
            width: 95px; 
            flex-shrink: 0;
            background: #334155; border-radius: 6px; 
            height: 30px; 
            overflow: hidden; 
        }
        .bar-fill { height: 100%; background: var(--success); width: 0%; transition: width 0.3s; }
        .bar-fill.condition { background: var(--condition-color); }
        .bar-fill.exp { background: #8b5cf6; }
        
        .bar-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 800; color: #fff; text-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }

        .info-btn {
            background: #475569; color: #fff;
            width: 20px; height: 20px; border-radius: 50%;
            font-size: 11px; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            padding: 0; flex-shrink: 0; transition: background 0.2s;
        }
        .info-btn:active { background: var(--accent-color); }

        /* 헤더 우측 레이아웃 최적화 */
        .header-right { 
            display: flex; flex-direction: column; align-items: flex-end; justify-content: center; 
            width: 43%; flex-grow: 1; overflow: hidden;
        }
        
        #game-date { font-size: 15px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; white-space: nowrap; }
        
        /* [수정] 돈 폰트가 화면을 침범해 밀려나지 않도록 clamp 함수 및 자동 축소 스케일링 기법 장착 */
        #stat-money { 
            font-size: clamp(22px, 6.5vw, 44px); 
            font-weight: 900; 
            color: #fbbf24; 
            text-shadow: 0 3px 6px rgba(0,0,0,0.5); 
            line-height: 1.1; 
            white-space: nowrap;
            letter-spacing: -0.5px;
            word-break: break-all;
        }
        #stat-passive-rate { font-size: 12px; font-weight: 700; color: var(--success); margin-top: 2px; white-space: nowrap; }

        /* 중앙 캐릭터 영역 */
        main {
            height: 100%; display: flex; flex-direction: column;
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 210px; 
            padding-bottom: 230px; 
            padding-left: 20px;  
            padding-right: 20px; 
        }
        #debuff-label { color: var(--danger); font-size: 14px; font-weight: bold; margin-bottom: 10px; height: 20px; }
        
        #char-display { 
            font-size: 80px; margin-bottom: 15px; cursor: pointer; user-select: none;
            transition: transform 0.05s; 
        }
        #char-display:active { transform: scale(0.85); }
        
        #current-action-label { color: var(--text-sub); font-size: 14px; margin-bottom: 5px; font-weight: 600; text-align: center; }
        .click-notice { font-size: 11px; color: var(--accent-color); margin-bottom: 15px; opacity: 0.7; text-align: center;}
        
        /* 프로그레스 바 & 취소 */
        .progress-wrapper { width: 95%; display: none; flex-direction: column; align-items: center; gap: 8px; }
        #progress-container { width: 100%; height: 12px; background: #334155; border-radius: 6px; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s linear;}
        #time-left { font-size: 12px; color: var(--text-sub); text-align: center;}
        #cancel-btn { background: var(--danger); color: white; padding: 8px 18px; font-size: 12px; margin-top: 5px; }

        /* 하단 통합 메뉴 구역 (3열 2행 구조) */
        .bottom-menu-matrix {
            position: absolute;
            bottom: 54px; 
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px;
            padding: 12px;
            background: rgba(30, 41, 59, 0.95);
            border-top: 1px solid #334155;
            z-index: 10;
        }
        
        .action-btn {
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; 
            height: 72px; 
            background: #334155; color: #fff; gap: 6px; overflow: hidden; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.1s;
        }
        .action-btn:active { background: #475569; }
        .action-btn i { font-size: 22px; font-style: normal; } 
        .action-btn span { font-size: 12px; font-weight: 700; white-space: nowrap;} 
        
        .disabled-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
            color: var(--danger); font-size: 24px; font-weight: bold; display: none;
        }

        /* 하단 임시 배너 광고 스페이스 */
        #ad-banner {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 54px; 
            background: #1e293b; border-top: 1px solid #334155;
            color: var(--text-sub); display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; z-index: 10; letter-spacing: 0.5px;
        }

        /* 바텀 시트 (모달) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 100;
        }
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: var(--card-bg); border-radius: 24px 24px 0 0;
            padding: 25px 25px 10px 25px; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101; display: flex; flex-direction: column; height: 420px; 
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; flex-shrink: 0; }
        .close-sheet { font-size: 24px; color: var(--text-sub); cursor: pointer; }
        
        #sheet-content {
            overflow-y: auto; flex-grow: 1; padding-bottom: 15px;
            scrollbar-width: thin; scrollbar-color: #475569 var(--card-bg);
        }
        #sheet-content::-webkit-scrollbar { width: 6px; }
        #sheet-content::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }

        .list-item {
            background: #334155; margin-bottom: 10px; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .list-item:active { background: #475569; }
        .item-info { display: flex; flex-direction: column; gap: 4px; width: 58%; }
        .item-name { font-weight: 600; font-size: 14px; }
        .item-sub { font-size: 11px; color: var(--text-sub); }
        .item-price-box { display: flex; flex-direction: column; align-items: flex-end; width: 42%; }
        .item-price { font-size: 11px; font-weight: bold; text-align: right; line-height: 1.3;}
        .item-bonus { color: var(--success); font-size: 10px; font-weight: 700; }
        .item-owned { color: var(--warning); font-size: 11px; font-weight: bold; }

        .color-maemae { color: var(--warning) !important; }   
        .color-wolse { color: var(--danger) !important; }     
        .color-jeonse { color: var(--accent-color) !important; } 

        /* 커스텀 확인/얼럿 모달 */
        .alert-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); padding: 25px; border-radius: 16px;
            width: 85%; max-width: 330px; z-index: 200; display: none; text-align: center;
            border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .alert-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .alert-desc { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.5; white-space: pre-wrap; text-align: left; }
        .alert-btn-box { display: flex; gap: 10px; }
        .alert-btn { background: var(--accent-color); color: #fff; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; }
        .alert-btn.cancel { background: #475569; }

        .working { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -1px) rotate(-1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">K-직장인 키우기</div>
        <div class="slogan">여기선 부자가 되어보자!</div>
        <button id="start-btn">시작하기</button>
    </div>

                        <div class="bar-text"><span id="val-condition">100</span> / <span id="val-max-condition">100</span></div>
                    </div>
                    <button class="info-btn" onclick="showStatHelp('condition')">?</button>
                </div>
                
                <div class="stat-row">
                    <div class="stat-label-left">체력</div>
                    <div class="bar-container">
                        <div id="stamina-fill" class="bar-fill"></div>
                        <div class="bar-text"><span id="val-stamina">0</span></div>
                    </div>
                    <button class="info-btn" onclick="showStatHelp('stamina')">?</button>
                </div>
                
                <div class="stat-row">
                    <div class="stat-label-left">업무력</div>
                    <div class="bar-container">
                        <div id="exp-fill" class="bar-fill exp"></div>
                        <div class="bar-text"><span id="val-exp">0</span> / <span id="val-req-exp">8000</span></div>
                    </div>
                    <button class="info-btn" onclick="showStatHelp('exp')">?</button>
                </div>
            </div>
            
            <div class="header-right">
                <div id="game-date">0년 0월 0일 00:00</div>
                <div id="stat-money">0원</div>
                <div id="stat-passive-rate">(초당 +0.00원)</div>
            </div>
        </header>

        <main>
            <div id="debuff-label"></div>
            <div class="rank-badge" style="margin-bottom: 12px;"><span id="rank-badge-text">수습</span></div>
            <div id="char-display" onclick="clickCharacter()">🙇‍♂️</div>
            <div id="current-action-label">대기 중...</div>
            <div class="click-notice" id="click-notice">💡 캐릭터를 탭하면 돈을 법니다!</div>
            
            <div class="progress-wrapper" id="progress-wrapper">
                <div id="progress-container"><div id="progress-bar"></div></div>
                <div id="time-left">00:00 남음</div>
                <button id="cancel-btn" onclick="cancelWork()">작업 취소</button>
            </div>
        </main>

        <div class="bottom-menu-matrix">
            <button class="action-btn" onclick="openSheet('work')">
                <i>💼</i><span>업무</span>
                <div id="work-disabled-x" class="disabled-overlay">X</div>

            <button class="action-btn" onclick="openSheet('rest')"><i>💤</i><span>휴식</span></button>
            <button class="action-btn" onclick="openSheet('buff')"><i>💊</i><span>버프</span></button>
            
            <button class="action-btn" onclick="openSheet('shop')"><i>🛒</i><span>쇼핑</span></button>
            <button class="action-btn" onclick="openSheet('house')"><i>🏠</i><span>부동산</span></button>
            <button class="action-btn" onclick="openSheet('car')"><i>🚗</i><span>자동차</span></button>
        </div>

        <div id="ad-banner">
            여기에 구글 애드센스 등 배너 광고 코드가 매핑됩니다.
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="bottom-sheet" id="bottom-sheet">
        <div class="sheet-title">

            <span class="close-sheet" onclick="closeSheet()">&times;</span>

        <div id="sheet-content"></div>

            {id: 'small_car', name: "소형 세단 (아반떼)", price: 25000000, desc: "주말 거래처 미팅 시 기가 살기 시작합니다."},
            {id: 'mid_car', name: "중형 SUV (쏘렌토)", price: 42000000, desc: "대리급 직장인의 이상적인 패밀리카."},
            {id: 'large_car', name: "대형 세단 (제네시스 G80)", price: 75000000, desc: "임원진 주차 구역 프리패스권 획득 가능."}
        ];

        // --- 상태 변수 ---
        let state = {
            money: 0, stamina: 0, exp: 0, rankIdx: 0,
            condition: 100, maxCondition: 100, 
            houseIdx: 0, gameSeconds: 0, rentDayCounter: 0,
            
            isWorking: false, currentTask: null,
            workElapsed: 0, workInterval: null,
            
            debuffTimeLeft: 0,
            timeMult: 1.0, 
            ownedItems: [],
            lastSaveTime: 0
        };

        const SAVE_KEY = "k_worker_tycoon_save_data";

        // --- 포맷 유틸 ---
        function formatMMSS(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        function formatTextTime(seconds) {
            if(seconds >= 60) {
                const m = Math.floor(seconds/60);
                const s = seconds%60;
                return s > 0 ? `${m}분 ${s}초` : `${m}분`;
            }
            return `${seconds}초`;
        }

        // --- 로컬스토리지 세이브 & 로드 기능 엔진 ---
        function saveGame() {
            state.lastSaveTime = Date.now();
            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        }

        function loadGame() {
            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    state = { ...state, ...parsed };
                } catch (e) {
                    console.error("데이터 로드 중 파싱 에러 발생:", e);
                }
            }
        }

        // 방치형 공백 시간 정산 엔진
        function processOfflineProgress(deltaTime) {
            if (deltaTime <= 0) return;
            
            let offlineReports = [];
            let timeToDeductFromPassive = deltaTime;

            if (state.isWorking && state.currentTask) {
                let task = state.currentTask;

                if (task.time) { 
                    let actualTime = task.id === 'cheat' ? task.time : Math.ceil(task.time * state.timeMult);
                    let remainingTaskTime = actualTime - state.workElapsed;

                    if (deltaTime >= remainingTaskTime) {
                        if (task.id === 'cheat') {
                            if (Math.random() < task.risk) {
                                let lostMoney = 1000;
                                state.money = Math.max(0, state.money - lostMoney);
                                state.debuffTimeLeft = Math.max(0, 180 - (deltaTime - remainingTaskTime));
                                offlineReports.push(`📱 [적발] 방치 중 딴짓(주식보기)을 하다가 부장님께 들켰습니다! 위자료 1,000원이 감봉되었고 페널티가 부여되었습니다.`);
                            } else {
                                let earn = Math.floor(Math.random() * (task.money[1] - task.money[0] + 1)) + task.money[0];
                                state.money += earn;
                                state.exp = Math.max(0, state.exp - 1);
                                offlineReports.push(`📱 [완전범죄] 부장님의 눈을 피해 성공적으로 딴짓을 마쳤습니다! 용돈 +${earn.toLocaleString()}원 보너스 획득 (업무력 -1)`);
                            }
                        } else {
                            if (state.condition >= task.conditionCost) {
                                let baseMoney = task.money + RANKS[state.rankIdx].bonus;
                                let totalMoney = Math.floor(baseMoney * getIncomeMultiplier(state.stamina));
                                state.money += totalMoney;
                                state.exp += task.exp;
                                state.condition = Math.max(0, state.condition - task.conditionCost);
                                offlineReports.push(`💼 [업무완료] 부재 중 [${task.name}] 업무가 정상 완료되었습니다. (+${totalMoney.toLocaleString()}원, 업무력 +${task.exp})`);
                            } else {
                                offlineReports.push(`⚠️ [업무중단] 컨디션 부족으로 인해 [${task.name}] 업무가 중도에 멈췄습니다.`);
                            }
                        }
                        
                        timeToDeductFromPassive -= remainingTaskTime;
                        state.isWorking = false;
                        state.currentTask = null;
                        state.workElapsed = 0;
                    } else {
                        state.workElapsed += deltaTime;
                        timeToDeductFromPassive = 0;
                        offlineReports.push(`💼 [업무 진행 중] 부재중에도 [${task.name}] 업무를 묵묵히 수행하고 있습니다.`);
                    }
                } else if (task.minTime) { 
                    state.workElapsed += deltaTime;
                    offlineReports.push(`💤 [휴식 진행 중] [${task.name}] 상태로 편안하게 휴식을 취하며 체력을 비축했습니다.`);
                    timeToDeductFromPassive = 0;
                }
            }

            if (timeToDeductFromPassive > 0) {
                state.gameSeconds += timeToDeductFromPassive * 540;
                
                let passiveRate = 0.5 * getIncomeMultiplier(state.stamina);
                let passiveEarned = passiveRate * timeToDeductFromPassive;
                state.money += passiveEarned;

                if (state.debuffTimeLeft > 0) {
                    state.debuffTimeLeft = Math.max(0, state.debuffTimeLeft - timeToDeductFromPassive);
                }

                if (passiveEarned > 0) {
                    offlineReports.push(`💰 [패시브 소득] 자리를 비운 ${formatTextTime(timeToDeductFromPassive)} 동안 숨만 쉬고도 총 +${Math.floor(passiveEarned).toLocaleString()}원이 자동으로 쌓였습니다.`);
                }
            }

            let totalMin = Math.floor(state.gameSeconds / 60);
            let currentDay = Math.floor(totalMin / (60 * 24));
            if (currentDay > 0 && Math.floor(currentDay / 30) > Math.floor(state.rentDayCounter / 30)) {
                let monthsPassed = Math.floor(currentDay / 30) - Math.floor(state.rentDayCounter / 30);
                let house = HOUSES[state.houseIdx];
                if (house.rent > 0) {
                    let totalRent = house.rent * monthsPassed;
                    if (state.money >= totalRent) {
                        state.money -= totalRent;
                        offlineReports.push(`🏠 [부동산 월세] 방치 도중 월세 집 계약 만료일이 도래하여 총 ${totalRent.toLocaleString()}원이 자동 이체되었습니다.`);
                    } else {
                        state.houseIdx = 0;
                        offlineReports.push(`🏠 [강제 퇴거] 잔고 부족으로 인해 월세가 연체되어 고시원/오피스텔에서 쫓겨났습니다! 부모님 집으로 강제 복귀합니다...`);
                    }
                }
                state.rentDayCounter = currentDay;
            }

            if (offlineReports.length > 0) {
                setTimeout(() => {
                    showAlert("💤 오프라인 방치 정산 보고서", offlineReports.join("\n\n"));
                }, 600);
            }
        }

        function startTaskInterval() {
            if (!state.isWorking || !state.currentTask) return;
            let task = state.currentTask;
            const charDisp = document.getElementById('char-display');
            const progressWrap = document.getElementById('progress-wrapper');
            const progressBar = document.getElementById('progress-bar');
            const label = document.getElementById('current-action-label');
            const timeLeftLabel = document.getElementById('time-left');
            const cancelBtn = document.getElementById('cancel-btn');

            charDisp.innerText = task.icon;
            progressWrap.style.display = 'flex';
            document.getElementById('click-notice').style.display = 'none';

            if (task.time) { 
                charDisp.classList.add('working');
                label.innerText = `${task.name} 중...`;
                cancelBtn.innerText = "작업 취소";
                cancelBtn.style.display = 'block';
                let actualTime = task.id === 'cheat' ? task.time : Math.ceil(task.time * state.timeMult);

                state.workInterval = setInterval(() => {
                    state.workElapsed++;
                    let remain = actualTime - state.workElapsed;
                    progressBar.style.width = ((state.workElapsed / actualTime) * 100) + "%";
                    timeLeftLabel.innerText = `${formatMMSS(remain)} 남음`;

                    if(state.workElapsed >= actualTime) finishWork(task, false, actualTime);
                }, 1000);
            } else if (task.minTime) { 
                label.innerText = `${task.name}\n(최소 ${formatTextTime(task.minTime)} 필요)`;
                progressBar.style.width = '100%';
                cancelBtn.innerText = "일어나기 (휴식 종료)";
                cancelBtn.style.display = 'block';

                state.workInterval = setInterval(() => {
                    state.workElapsed++;
                    let status = state.workElapsed < task.minTime 
                        ? `최소 시간까지 ${formatMMSS(task.minTime - state.workElapsed)} 남음` 
                        : `휴식 중... (현재 ${formatMMSS(state.workElapsed)})`;
                    timeLeftLabel.innerText = status;
                }, 1000);
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && document.getElementById('game-screen').style.display === 'block') {
                if (state.workInterval) clearInterval(state.workInterval);
                
                const savedData = localStorage.getItem(SAVE_KEY);
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    let now = Date.now();
                    let deltaTime = Math.floor((now - parsed.lastSaveTime) / 1000);
                    
                    if (deltaTime > 2) { 
                        loadGame();
                        processOfflineProgress(deltaTime);
                        updateDisplay();
                        if (state.isWorking && state.currentTask) {
                            startTaskInterval();
                        } else {
                            resetUI();
                        }
                    }
                }
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem(SAVE_KEY)) {
                document.getElementById('start-btn').innerText = "이어하기";
            }
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            loadGame(); 
            const savedData = localStorage.getItem(SAVE_KEY);
            if (savedData) {
                const parsed = JSON.parse(savedData);
                let deltaTime = Math.floor((Date.now() - parsed.lastSaveTime) / 1000);
                if (deltaTime > 0) {
                    processOfflineProgress(deltaTime);
                }
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            updateDisplay(); 
            
            if (state.isWorking && state.currentTask) {
                startTaskInterval();
            } else {
                resetUI();
            }
            startGameLoop();
        });

        function getIncomeMultiplier(s) {
            if(s <= 10000) return Math.pow(1.0002, s);
            return 7.38 + ((s - 10000) * 0.0005);
        }

        function showStatHelp(type) {
            let title = "";
            let desc = "";
            if (type === 'condition') {
                title = "❓ 컨디션 가이드";
                desc = "업무를 진행할 때마다 소모되는 기력입니다.\n\n컨디션이 소진되면 더 이상 업무를 인계받아 수행할 수 없으므로, 상점의 '버프 아이템'을 상시 복용하거나 '휴식'을 취해 컨디션을 관리해 주어야 합니다.";
            } else if (type === 'stamina') {
                title = "❓ 체력 가이드";
                desc = "K-직장인의 진정한 기초 자산입니다.\n\n체력이 누적될수록 캐릭터를 클릭하여 터치할 때 버는 돈이 늘어나며, 가만히 대기해도 벌리는 '초당 패시브 소득' 또한 비약적으로 우상향합니다. 휴식을 완수하여 영구적으로 누적 빌드업할 수 있습니다.";
            } else if (type === 'exp') {
                title = "❓ 업무력 가이드";
                desc = "회사의 가치 기여도를 수치화한 경험치입니다.\n\n업무를 완료하여 업무력을 한계치까지 누적시키면 다음 직급으로 즉시 승진하게 됩니다. 직급이 승진할수록 고유 업무당 지급받는 수당에 보너스 배수가 인상 적용됩니다.";
            }
            showAlert(title, desc);
        }

        function clickCharacter() {
            if (state.debuffTimeLeft > 0) return; 
            let clickEarn = 1 * getIncomeMultiplier(state.stamina);
            state.money += clickEarn;
            
            document.getElementById('stat-money').innerText = Math.floor(state.money).toLocaleString() + "원";
            document.getElementById('click-notice').innerText = `+${Math.floor(clickEarn).toLocaleString()}원 획득!`;
            setTimeout(() => {
                if(!state.isWorking) document.getElementById('click-notice').innerText = "💡 캐릭터를 탭하면 돈을 법니다!";
            }, 800);
            saveGame(); 
        }

        function startGameLoop() {
            setInterval(() => {
                state.gameSeconds += 540; 
                
                if(state.debuffTimeLeft > 0) {
                    state.debuffTimeLeft--;
                    document.getElementById('debuff-label').innerText = `🔥 ${formatMMSS(state.debuffTimeLeft)} 혼나는 중...`;
                    document.getElementById('work-disabled-x').style.display = 'flex';
                } else {
                    document.getElementById('debuff-label').innerText = "";
                    document.getElementById('work-disabled-x').style.display = 'none';
                }

                let currentTotalDays = Math.floor(state.gameSeconds / (60 * 60 * 24));
                if (currentTotalDays > 0 && currentTotalDays % 30 === 0 && state.rentDayCounter !== currentTotalDays) {
                    state.rentDayCounter = currentTotalDays;
                    let house = HOUSES[state.houseIdx];
                    if (house.rent > 0) {
                        if (state.money >= house.rent) {
                            state.money -= house.rent;
                            showAlert("월세 납부", `월세 ${house.rent.toLocaleString()}원이 자동 이체되었습니다.`);
                        } else {
                            state.houseIdx = 0; 
                            showAlert("월세 미납!", `통장 잔고 부족으로 강제 퇴거당했습니다.\n다시 부모님 집으로 돌아갑니다...`);
                        }
                    }
                }

                let passiveRate = 0.5 * getIncomeMultiplier(state.stamina);
                state.money += passiveRate;

                updateDisplay();
                saveGame(); 
            }, 1000);
        }

        function updateDisplay() {
            const totalMin = Math.floor(state.gameSeconds / 60);
            const hour = Math.floor(totalMin / 60) % 24;
            const day = Math.floor(totalMin / (60 * 24)) % 30;
            const month = Math.floor(totalMin / (60 * 24 * 30)) % 12;
            const year = Math.floor(totalMin / (60 * 24 * 30 * 12));
            document.getElementById('game-date').innerText = `${year}년 ${month+1}월 ${day+1}일 ${String(hour).padStart(2,'0')}:00`;
            
            document.getElementById('stat-money').innerText = Math.floor(state.money).toLocaleString() + "원";
            
            let currentPassive = 0.5 * getIncomeMultiplier(state.stamina);
            document.getElementById('stat-passive-rate').innerText = `(초당 +${currentPassive.toFixed(2)}원)`;

            document.getElementById('val-condition').innerText = Math.floor(state.condition).toLocaleString();
            document.getElementById('val-max-condition').innerText = Math.floor(state.maxCondition).toLocaleString();
            let strPercent = Math.min(100, (state.condition / state.maxCondition) * 100);
            document.getElementById('condition-fill').style.width = strPercent + '%';

            document.getElementById('val-stamina').innerText = Math.floor(state.stamina).toLocaleString();
            let stPercent = Math.min(100, (state.stamina / 10000) * 100);
            document.getElementById('stamina-fill').style.width = stPercent + '%';

            if(state.rankIdx < RANKS.length - 1 && state.exp >= RANKS[state.rankIdx+1].req) {
                state.rankIdx++;
                showAlert("승진!", `축하합니다! ${RANKS[state.rankIdx].name}(으)로 승진하셨습니다!`);
            }
            document.getElementById('rank-badge-text').innerText = RANKS[state.rankIdx].name;
            
            let reqExp = RANKS[state.rankIdx+1] ? RANKS[state.rankIdx+1].req : RANKS[state.rankIdx].req;
            let currentLevelExp = state.exp - RANKS[state.rankIdx].req;
            let levelTotalExp = reqExp - RANKS[state.rankIdx].req;
            let expPercent = reqExp === RANKS[state.rankIdx].req ? 100 : Math.min(100, (currentLevelExp / levelTotalExp) * 100);
            
            document.getElementById('val-exp').innerText = Math.floor(state.exp).toLocaleString();
            document.getElementById('val-req-exp').innerText = reqExp.toLocaleString();
            document.getElementById('exp-fill').style.width = expPercent + '%';
        }

        // --- 모달 제어 ---
        function showAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-btn-box').innerHTML = `<button class="alert-btn" onclick="closeAlert()">확인</button>`;
            document.getElementById('alert-overlay').style.display = 'block';
            document.getElementById('alert-modal').style.display = 'block';
        }
        function showConfirm(title, desc, onConfirm) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-btn-box').innerHTML = `
                <button class="alert-btn cancel" onclick="closeAlert()">취소</button>
                <button class="alert-btn" id="confirm-ok-btn">확인</button>
            `;
            document.getElementById('confirm-ok-btn').onclick = () => {
                onConfirm();
                closeAlert();
            };
            document.getElementById('alert-overlay').style.display = 'block';
            document.getElementById('alert-modal').style.display = 'block';
        }
        function closeAlert() {
            document.getElementById('alert-overlay').style.display = 'none';
            document.getElementById('alert-modal').style.display = 'none';
        }

        // --- 업무 실행 분기 ---
        function doWork(idx) {
            let job = JOBS[idx];
            if(state.debuffTimeLeft > 0) return showAlert("업무 불가", "혼나는 중이라 일을 할 수 없습니다!");
            
            if(state.condition < job.conditionCost) {
                return showAlert("컨디션 부족!", `업무를 수행하기에 컨디션이 부족합니다.\n필요량: ${job.conditionCost}\n(현재 컨디션: ${Math.floor(state.condition)})`);
            }

            if(state.isWorking) return;
            
            if (job.id === 'cheat') {
                let warningDesc = `⚠️ 부장님께 들키면 치명적인 불이익이 따릅니다.\n\n딴짓을 하다가 30% 확률로 걸리면 3분 동안 혼나고 통장에서 1,000원이 감소됩니다. 그래도 하실건가요?`;
                showConfirm("📱 딴짓을 시작하시겠습니까?", warningDesc, () => {
                    executeWorkStart(job);
                });
            } else {
                executeWorkStart(job);
            }
        }

        function executeWorkStart(job) {
            state.isWorking = true;
            state.currentTask = job;
            state.workElapsed = 0;
            closeSheet();
            startTaskInterval();
        }

        function cancelWork() {
            if(!state.isWorking || !state.currentTask) return;
            
            if (state.currentTask.id === 'cheat') {
                clearInterval(state.workInterval);
                resetUI();
                showAlert("작업 취소", "딴짓을 그만두었습니다.");
                saveGame();
                return;
            }

            if(state.currentTask.minTime) { 
                finishRest();
                return;
            }
            
            let actualTime = Math.ceil(state.currentTask.time * state.timeMult);
            finishWork(state.currentTask, true, actualTime);
        }

        function finishWork(job, isCanceled, actualTime) {
            clearInterval(state.workInterval);
            resetUI();
            
            if(job.risk && !isCanceled) {
                if(Math.random() < job.risk) {
                    let lostMoney = 1000; 
                    state.money = Math.max(0, state.money - lostMoney);
                    state.debuffTimeLeft = 180; 
                    showAlert("적발됨!", `딴짓하다 부장님께 걸렸습니다!\n위자료 ${lostMoney}원 삭감\n3분간 업무 정지 페널티!`);
                    updateDisplay();
                    saveGame();
                    return;
                } else {
                    let earn = Math.floor(Math.random() * (job.money[1] - job.money[0] + 1)) + job.money[0];
                    state.money += earn;
                    state.exp = Math.max(0, state.exp - 1); 
                    showAlert("완전 범죄", `성공적으로 딴짓을 마쳤습니다.\n용돈 ${earn}원을 벌고 업무력 1이 깎였습니다.`);
                    updateDisplay();
                    saveGame();
                    return;
                }
            }

            let ratio = isCanceled ? (state.workElapsed / actualTime) : 1;
            
            let costDeducted = Math.floor(job.conditionCost * ratio);
            state.condition = Math.max(0, state.condition - costDeducted);

            let baseMoney = job.money + RANKS[state.rankIdx].bonus;
            let totalMoney = baseMoney * getIncomeMultiplier(state.stamina);
            
            let earnedMoney = Math.floor(totalMoney * ratio);
            let earnedExp = Math.floor(job.exp * ratio);

            state.money += earnedMoney;
            state.exp += earnedExp;
            
            if(isCanceled) {
                showAlert("작업 취소", `중도 취소했습니다.\n진행 비율 정산에 따라 ${earnedMoney.toLocaleString()}원을 벌고, 컨디션이 ${costDeducted} 감소했습니다.`);
            }
            updateDisplay();
            saveGame();
        }

        // --- 휴식 실행 ---
        function startRest(idx) {
            let rest = RESTS[idx];
            if(state.debuffTimeLeft > 0) return showAlert("업무 불가", "혼나는 중입니다!");
            if(state.isWorking) return;
            state.isWorking = true;
            state.currentTask = rest;
            state.workElapsed = 0;
            closeSheet();
            startTaskInterval();
        }

        function finishRest() {
            clearInterval(state.workInterval);
            let rest = state.currentTask;
            let houseMult = (rest.id === 'sleep') ? HOUSES[state.houseIdx].mult : 1.0;
            let totalMinutesResting = state.workElapsed / 60;
            
            let gainedStamina = totalMinutesResting * rest.rate * houseMult;
            let gainedMaxCondition = totalMinutesResting * rest.conditionRate; 
            
            state.stamina += gainedStamina;
            state.maxCondition += gainedMaxCondition;
            
            let msg = `총 ${formatMMSS(state.workElapsed)} 동안 휴식했습니다.\n체력 +${Math.floor(gainedStamina)} 상승\n최대 컨디션 +${Math.floor(gainedMaxCondition)} 영구 누적!`;
            
            if (state.workElapsed >= rest.minTime) {
                state.condition = state.maxCondition;
                msg += `\n\n💡 [보너스] 최소 이행 시간 달성으로 현재 컨디션이 최대치(${Math.floor(state.maxCondition)})로 전액 완치되었습니다!`;
            } else {
                msg += `\n\n⚠️ 최소 시간(${formatTextTime(rest.minTime)})을 채우지 못해 현재 닳아있는 컨디션은 회복되지 않았습니다.`;
            }
            
            resetUI();
            showAlert("휴식 정산", msg);
            updateDisplay();
            saveGame();
        }

        function resetUI() {
            state.isWorking = false;
            state.currentTask = null;
            document.getElementById('char-display').classList.remove('working');
            document.getElementById('progress-wrapper').style.display = 'none';
            document.getElementById('current-action-label').innerText = "대기 중...";
            document.getElementById('char-display').innerText = "🙇‍♂️";
            document.getElementById('click-notice').style.display = 'block';
        }

        // --- 상점/부동산 바인딩 ---
        function buyBuff(idx) {
            let buff = BUFFS[idx];
            if (state.money >= buff.price) {
                if (state.condition >= state.maxCondition) {
                    return showAlert("사용 불가", "이미 컨디션이 최상 상태입니다!");
                }
                state.money -= buff.price;
                state.condition = Math.min(state.maxCondition, state.condition + buff.effect);
                showAlert("버프 사용", `${buff.name} 복용 완료!\n현재 컨디션이 +${buff.effect} 회복되었습니다.`);
                updateDisplay();
                closeSheet();
                saveGame();
            } else {
                showAlert("잔액 부족", "돈이 부족합니다!");
            }
        }

        function buyShop(idx) {
            let item = SHOPS[idx];
            if (state.ownedItems.includes(item.id)) return showAlert("안내", "이미 보유 중인 장비입니다.");
            
            if (state.money >= item.price) {
                state.money -= item.price;
                state.ownedItems.push(item.id);
                state.timeMult *= item.mult;
                showAlert("쇼핑 완료", `${item.name} 장착 완료!`);
                updateDisplay();
                openSheet('shop');
                saveGame();
            } else {
                showAlert("잔액 부족", "돈이 부족합니다!");
            }
        }

        function buyHouse(idx) {
            let house = HOUSES[idx];
            if (state.houseIdx === idx) return showAlert("안내", "현재 거주 중인 집입니다.");
            
            let initialCost = house.deposit + house.moveCost;
            if (house.id === 'goshi') initialCost += house.rent; 

            if (state.money < initialCost) {
                return showAlert("잔액 부족", `계약에 필요한 최소 자금이 부족합니다.\n필요 자금: ${initialCost.toLocaleString()}원`);
            }

            let desc = `🏠 [${house.name}] 계약 청구서\n\n`;
            if (house.type === "매매") {
                desc += `매매가: ${house.deposit.toLocaleString()}원\n`;
            } else if (house.id !== 'goshi') {
                desc += `보증금: ${house.deposit.toLocaleString()}원\n`;
            }
            
            if (house.id === 'goshi') desc += `선불 월세: ${house.rent.toLocaleString()}원\n`;
            desc += `이사비용: ${house.moveCost.toLocaleString()}원\n`;
            desc += `-----------------------------\n총 ${initialCost.toLocaleString()}원이 청구됩니다. 이사하시겠습니까?`;

            showConfirm("이사를 시작하시겠습니까?", desc, () => {
                state.money -= initialCost;
                state.houseIdx = idx;
                
                let msg = `${house.name}(으)로 이사를 완료했습니다!\n수면 시 체력 획득량이 ${house.mult}배로 적용됩니다.`;
                showAlert("이사 성공", msg);
                updateDisplay();
                closeSheet();
                saveGame();
            });
        }

        // --- 시트 제어 ---
        function openSheet(type) {
            if(state.debuffTimeLeft > 0 && type === 'work') {
                return showAlert("업무 불가", "혼나는 중이라 일을 지시받을 수 없습니다!");
            }

            const sheet = document.getElementById('bottom-sheet');
            const overlay = document.getElementById('overlay');
            const header = document.getElementById('sheet-header');
            const content = document.getElementById('sheet-content');
            content.innerHTML = "";
            overlay.style.display = 'block';
            sheet.classList.add('active');

            let mult = getIncomeMultiplier(state.stamina);

            if(type === 'work') {
                header.innerText = "업무 지시";
                JOBS.forEach((job, i) => {
                    let actualTime = job.id === 'cheat' ? job.time : Math.ceil(job.time * state.timeMult);
                    let html = '';
                    if(job.id === 'cheat') {
                        html = `
                        <div class="list-item" onclick='doWork(${i})'>
                            <div class="item-info">
                                <span class="item-name" style="color:var(--danger);">${job.name}</span>
                                <span class="item-sub">시간: ${actualTime}초 | 리스크: ${(job.risk*100)}% | 컨디션 소모 무</span>
                            </div>
                            <div class="item-price-box">
                                <span class="item-price" style="color:#fbbf24;">100원 ~ 1,000원</span>
                            </div>
                        </div>`;
                    } else {
                        let baseTotal = job.money + RANKS[state.rankIdx].bonus;
                        let expected = baseTotal * mult;
                        let bonus = Math.floor(expected - baseTotal);
                        html = `
                        <div class="list-item" onclick='doWork(${i})'>
                            <div class="item-info">
                                <span class="item-name">${job.name}</span>
                                <span class="item-sub">시간: ${formatTextTime(actualTime)} | 업무력: ${job.exp} | <span style="color:var(--condition-color); font-weight:bold;">소모 컨디션: ${job.conditionCost}</span></span>
                            </div>
                            <div class="item-price-box">
                                <span class="item-price">기본 ${baseTotal.toLocaleString()}원</span>
                                <span class="item-bonus">+${bonus.toLocaleString()}원 (배수)</span>
                            </div>
                        </div>`;
                    }
                    content.innerHTML += html;
                });
            } else if(type === 'rest') {
                header.innerText = "휴식 및 컨디션 관리";
                RESTS.forEach((rest, i) => {
                    content.innerHTML += `
                        <div class="list-item" onclick='startRest(${i})'>
                            <div class="item-info">
                                <span class="item-name">${rest.name}</span>
                                <span class="item-sub">최소 이행: ${formatTextTime(rest.minTime)} (컨디션 완치)</span>
                            </div>
                            <div class="item-price-box">
                                <span class="item-price" style="font-size:11px; line-height:1.4;">분당 체력 +${rest.rate}<br><span style="color:var(--condition-color);">분당 최대컨디션 +${rest.conditionRate}</span></span>
                                ${rest.id === 'sleep' ? `<span class="item-bonus">(현재 집 x${HOUSES[state.houseIdx].mult}배 적용)</span>` : ''}
                            </div>
                        </div>`;
                });
            } else if(type === 'buff') {
                header.innerText = "버프 아이템 (현재 컨디션 회복)";
                BUFFS.forEach((buff, i) => {
                    content.innerHTML += `
                        <div class="list-item" onclick='buyBuff(${i})'>
                            <div class="item-info">
                                <span class="item-name">${buff.name}</span>
                                <span class="item-sub" style="color:var(--condition-color); font-weight:bold;">현재 컨디션 +${buff.effect.toLocaleString()} 즉시 회복</span>
                            </div>
                            <div class="item-price-box">
                                <span class="item-price">${buff.price.toLocaleString()}원</span>
                            </div>
                        </div>`;
                });
            } else if(type === 'shop') {
                header.innerText = "쇼핑 (업무 시간 단축)";
                SHOPS.forEach((shop, i) => {
                    let isOwned = state.ownedItems.includes(shop.id);
                    content.innerHTML += `
                        <div class="list-item" onclick='buyShop(${i})' style="opacity: ${isOwned ? '0.5' : '1'}">
                            <div class="item-info">
                                <span class="item-name">${shop.name}</span>
                                <span class="item-sub">${shop.desc}</span>
                            </div>
                            <div class="item-price-box">
                                ${isOwned ? `<span class="item-owned">보유 중</span>` : `<span class="item-price">${shop.price.toLocaleString()}원</span>`}
                            </div>
                        </div>`;
                });
            } else if(type === 'house') {
                header.innerText = "부동산 계약";
                HOUSES.forEach((house, i) => {
                    let isCurrent = (state.houseIdx === i);
                    let priceText = '';
                    let colorClass = '';

                    if(house.type === '매매') colorClass = 'color-maemae';
                    else if(house.type === '월세') colorClass = 'color-wolse';
                    else if(house.type === '전세') colorClass = 'color-jeonse';
                    
                    if(house.id === 'home') {
                        priceText = '무료';
                    } else if(house.id === 'goshi') {
                        priceText = `선불 월세 ${house.rent.toLocaleString()}원`;
                    } else if(house.type === '매매') {
                        priceText = `매매가 ${house.deposit.toLocaleString()}원`;
                    } else {
                        priceText = `보증금 ${house.deposit.toLocaleString()}원`;
                    }

                    content.innerHTML += `
                        <div class="list-item" onclick='buyHouse(${i})' style="border: ${isCurrent ? '2px solid var(--accent-color)' : 'none'}">
                            <div class="item-info">
                                <span class="item-name">${house.name} <span class="${colorClass}" style="font-size:10px; font-weight:bold;">[${house.type}]</span></span>
                                <span class="item-sub" style="color:var(--success);">수면 효율 x${house.mult}배 | 이사비: ${house.moveCost.toLocaleString()}원</span>
                            </div>
                            <div class="item-price-box">
                                ${isCurrent ? `<span class="item-owned">거주 중</span>` : `
                                <span class="item-price ${colorClass}">${priceText}</span>
                                ${house.rent > 0 && house.id !== 'goshi' ? `<span class="item-sub" style="font-size:10px; color:var(--danger);">월세 ${house.rent.toLocaleString()}원</span>` : ''}
                                `}
                            </div>
                        </div>`;
                });
            } else if(type === 'car') {
                header.innerText = "K-자동차 매장 (가칭 대리점)";
                CARS.forEach((car, i) => {
                    content.innerHTML += `
                        <div class="list-item" onclick="showAlert('준비 중', '${car.name} 구매 기능은 현재 인게임 내부 시뮬레이션 구현 중입니다!')">
                            <div class="item-info">
                                <span class="item-name">🚗 ${car.name}</span>
                                <span class="item-sub">${car.desc}</span>
                            </div>
                            <div class="item-price-box">
                                <span class="item-price" style="color:var(--accent-color); font-size:13px;">${car.price.toLocaleString()}원</span>
                            </div>
                        </div>`;
                });
            }
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
