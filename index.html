<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-color: #0ea5e9;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
        }

        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 30px; text-align: center;
        }
        .logo { font-size: 34px; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; letter-spacing: -0.5px; }
        .slogan { font-size: 14px; color: var(--text-sub); margin-bottom: 35px; font-weight: 600; }
        
        .input-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }
        .login-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background: #ffffff;
            color: var(--text-main);
            transition: border-color 0.2s;
        }
        .login-input:focus {
            border-color: var(--accent-color);
        }

        #error-msg {
            font-size: 12px;
            color: var(--danger);
            font-weight: 700;
            margin-bottom: 15px;
            height: 18px;
        }

        #start-btn {
            width: 100%; max-width: 320px; padding: 16px; border: none; border-radius: 12px;
            font-weight: 700; background: var(--accent-color); color: #fff;
            font-size: 16px; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
            margin-bottom: 12px;
        }
        #start-btn:active { transform: scale(0.97); }

        .switch-mode-text {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">K-직장인 키우기</div>
        <div class="slogan">여기선 부자가 되어보자!</div>
        
        <div class="input-container">
            <input type="email" id="user-email" class="login-input" placeholder="이메일 주소 입력">
            <input type="password" id="user-password" class="login-input" placeholder="비밀번호 입력 (6자리 이상)">
        </div>

        <div id="error-msg"></div>

        <button id="start-btn">로그인 및 시작</button>
        <span class="switch-mode-text" id="mode-switch-btn" onclick="toggleAuthMode()">계정이 없으신가요? 회원가입하기</span>
    </div>

    <script>
        const SAVE_KEY = "k_worker_tycoon_save_data";
        let isSignUpMode = false; 

        const firebaseConfig = {
            apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",
            authDomain: "kkkjikjang.firebaseapp.com",
            projectId: "kkkjikjang",
            storageBucket: "kkkjikjang.firebasestorage.app",
            messagingSenderId: "138250223666",
            appId: "1:138250223666:web:997b7ed4572f717354fc2b"
        };

        if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("🚨")) {
            firebase.initializeApp(firebaseConfig);
        }

        window.onload = () => {
            if (localStorage.getItem(SAVE_KEY)) {
                document.getElementById('start-btn').innerText = "내 계정으로 이어하기";
            }

            document.getElementById('start-btn').onclick = () => {
                handleAuthAction();
            };
        };

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const startBtn = document.getElementById('start-btn');
            const switchBtn = document.getElementById('mode-switch-btn');
            const errorLabel = document.getElementById('error-msg');
            
            errorLabel.innerText = ""; 
            
            if (isSignUpMode) {
                startBtn.innerText = "새 계정으로 회원가입 및 시작";
                switchBtn.innerText = "이미 계정이 있으신가요? 로그인하기";
            } else {
                startBtn.innerText = localStorage.getItem(SAVE_KEY) ? "내 계정으로 이어하기" : "로그인 및 시작";
                switchBtn.innerText = "계정이 없으신가요? 회원가입하기";
            }
        }

        function handleAuthAction() {
            const email = document.getElementById('user-email').value.trim();
            const password = document.getElementById('user-password').value;
            const errorLabel = document.getElementById('error-msg');

            if (!email || !password) {
                errorLabel.innerText = "이메일과 비밀번호를 모두 입력해 주세요.";
                return;
            }
            if (password.length < 6) {
                errorLabel.innerText = "비밀번호는 6자리 이상 입력해 주세요.";
                return;
            }

            errorLabel.innerText = "서버 통신 중...";

            if (isSignUpMode) {
                // 1. 회원가입 프로세스 작동
                firebase.auth().createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        let user = userCredential.user;
                        
                        // 🚨 [밸런스 변경] 신규 회원가입 초기 자금을 천만 원에서 100,000원으로 전면 압축 밸런싱 패치
                        const DEFAULT_START_STATE = {
                            money: 100000, stamina: 0, exp: 0, rankIdx: 0, condition: 100, maxCondition: 100,
                            houseIdx: 0, carIdx: -1, gameSeconds: 0, rentDayCounter: 0, isWorking: false,
                            currentTask: null, workElapsed: 0, debuffTimeLeft: 0,
                            timeMult: 1.0, ownedItems: [], nickname: "신입", nicknameChangeCount: 0,
                            holdings: {}, buyPrinciples: {}, history: [], stockResetV3Done: true,
                            stocks: [
                                { name: "애비디아", price: 353189, prev: 353189, history: [353189] },
                                { name: "파인애플", price: 446539, prev: 446539, history: [446539] },
                                { name: "테슐라", price: 664130, prev: 664130, history: [664130] },
                                { name: "요크셔 했어웨이", price: 1089420000, prev: 1089420000, history: [1089420000] },
                                { name: "NBR", price: 8510000, prev: 8510000, history: [8510000] },
                                { name: "시바보드", price: 7050000, prev: 7050000, history: [7050000] },
                                { name: "효도중공업", price: 4600000, prev: 4600000, history: [4600000] },
                                { name: "SK바이닉스", price: 1864000, prev: 1864000, history: [1864000] },
                                { name: "하놔에어로스페이스", price: 1315000, prev: 1315000, history: [1315000] },
                                { name: "사성전기", price: 982000, prev: 982000, history: [982000] },
                                { name: "미래차", price: 756000, prev: 756000, history: [756000] },
                                { name: "한미중반도체", price: 409500, prev: 409500, history: [409500] },
                                { name: "오성전자", price: 277000, prev: 277000, history: [277000] },
                                { name: "코코아", price: 92400, prev: 92400, history: [92400] },
                                { name: "OK증권", price: 1250, prev: 1250, history: [1250] }
                            ]
                        };
                        
                        // Firestore 클라우드 원격지에 10만 원이 세팅된 진짜 세 가입 문서 등록
                        firebase.firestore().collection("users").doc(user.uid).set(DEFAULT_START_STATE)
                            .then(() => {
                                localStorage.removeItem(SAVE_KEY);
                                localStorage.setItem(SAVE_KEY, JSON.stringify(DEFAULT_START_STATE));
                                location.href = 'main.html';
                            })
                            .catch(() => {
                                localStorage.setItem(SAVE_KEY, JSON.stringify(DEFAULT_START_STATE));
                                location.href = 'main.html'; 
                            });
                    })
                    .catch((error) => {
                        errorLabel.innerText = getFirebaseErrorMessage(error.code);
                    });
            } else {
                // 2. 로그인 및 데이터 동기화 클라우드 로드 작동
                firebase.auth().signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        let user = userCredential.user;
                        
                        firebase.firestore().collection("users").doc(user.uid).get()
                            .then((doc) => {
                                if (doc.exists) {
                                    localStorage.removeItem(SAVE_KEY);
                                    localStorage.setItem(SAVE_KEY, JSON.stringify(doc.data()));
                                }
                                location.href = 'main.html';
                            })
                            .catch(() => {
                                location.href = 'main.html';
                            });
                    })
                    .catch((error) => {
                        errorLabel.innerText = getFirebaseErrorMessage(error.code);
                    });
            }
        }

        function getFirebaseErrorMessage(code) {
            switch (code) {
                case 'auth/invalid-email': return '유효하지 않은 이메일 형식입니다.';
                case 'auth/user-disabled': return '정지된 계정입니다. 관리자에게 문의하세요.';
                case 'auth/user-not-found': return '등록되지 않은 계정입니다. 회원가입을 해주세요.';
                case 'auth/wrong-password': return '비밀번호가 올바르지 않습니다.';
                case 'auth/email-already-in-use': return '이미 사용 중인 이메일 주소입니다.';
                case 'auth/weak-password': return '비밀번호 강도가 너무 약합니다.';
                default: return '계정 통신 오류가 발생했습니다. 다시 시도해 주세요.';
            }
        }
    </script>
</body>
</html>
