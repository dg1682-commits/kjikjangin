<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기 - 로그인</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --neon-pink: #f43f5e;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --bg-dark: #0f0a1c;
            --text-light: #f1f5f9;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #0f0a1c, #1e1538);
            color: var(--text-light); display: flex; justify-content: center; align-items: center;
        }
        .login-container {
            width: 90%; max-width: 360px; padding: 30px 24px;
            background: rgba(30, 21, 56, 0.6); border: 2px solid #3b2d66;
            border-radius: 20px; backdrop-filter: blur(10px); text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 25px; color: var(--text-light); }
        h1 span { color: var(--neon-pink); }
        
        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group label { font-size: 11px; color: var(--neon-cyan); font-weight: bold; display: block; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 12px 14px; background: rgba(15, 10, 28, 0.8);
            border: 1.5px solid #3b2d66; border-radius: 10px; color: #fff; font-size: 14px;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--neon-purple); outline: none; }
        
        /* 🚨 [추가된 레이아웃] ID/PW 저장 및 자동로그인 체크박스 영역 */
        .check-options {
            display: flex; justify-content: space-between; align-items: center;
            margin: 5px 0 20px 0; padding: 0 2px;
        }
        .check-label {
            display: flex; align-items: center; gap: 6px; font-size: 12px;
            color: #94a3b8; cursor: pointer; user-select: none;
        }
        .check-label input {
            width: 15px; height: 15px; accent-color: var(--neon-pink); cursor: pointer;
        }

        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: white; font-size: 15px; font-weight: 800; border-radius: 12px; border: none;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3); cursor: pointer; transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.97); }
        /* 로그인 버튼 바로 아래에 추가 */
.signup-btn {
    width: 100%; padding: 12px; margin-top: 10px;
    background: transparent; border: 1.5px solid var(--neon-purple);
    color: var(--neon-purple); font-size: 14px; font-weight: 700;
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
}
.signup-btn:hover { 
    background: rgba(168, 85, 247, 0.1); 
}
        
        .alert-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 21, 56, 0.95); padding: 20px; border-radius: 15px;
            width: 80%; max-width: 300px; z-index: 200; display: none; text-align: center;
            border: 2px solid var(--neon-purple); box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }
        .alert-btn { background: var(--neon-pink); color: #fff; padding: 10px; width: 100%; border-radius: 8px; font-weight: 800; border: none; margin-top: 15px; cursor: pointer; }
    /* 🚨 [추가] 회원가입 팝업 모달 스타일 */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
    display: none; justify-content: center; align-items: center; z-index: 1000;
}
.modal-content {
    width: 90%; max-width: 360px; padding: 30px;
    background: #1e1538; border: 2px solid var(--neon-purple);
    border-radius: 20px; text-align: center; color: var(--text-light);
}
    </style>
</head>
<body>

    <div class="login-container">
        <h1>💼 K-직장인 키우기<span>.</span></h1>
        
        <div class="input-group">
            <label>이메일 계정 (ID)</label>
            <input type="email" id="login-email" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label>비밀번호 (PW)</label>
            <input type="password" id="login-pw" placeholder="••••••••">
        </div>

        <div class="check-options">
            <label class="check-label">
                <input type="checkbox" id="chk-save-creds"> 계정 정보 저장
            </label>
            <label class="check-label">
                <input type="checkbox" id="chk-auto-login"> 자동 로그인
            </label>
        </div>

<button class="login-btn" onclick="handleLogin()">출근하기 (로그인)</button>
<button class="signup-btn" onclick="openSignupModal()">아직 계정이 없나요? (회원가입)</button>

<div id="signup-modal" class="modal-overlay">
    <div class="modal-content">
        <h1>회원가입</h1>
        <div class="input-group">
            <label>이메일 (ID)</label>
            <input type="email" id="signup-email" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" id="signup-pw" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>비밀번호 확인</label>
            <input type="password" id="signup-pw-confirm" placeholder="••••••••">
        </div>
        <button class="login-btn" onclick="handleSignup()">가입하기</button>
        <button class="signup-btn" style="border:none;" onclick="closeSignupModal()">취소</button>
    </div>
</div>

    <div class="alert-modal" id="alert-modal">
        <div style="font-size:14px; line-height:1.5;" id="alert-desc">내용</div>
        <button class="alert-btn" onclick="closeAlert()">확인</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",
            authDomain: "kkkjikjang.firebaseapp.com",
            projectId: "kkkjikjang",
            storageBucket: "kkkjikjang.firebasestorage.app",
            messagingSenderId: "138250223666",
            appId: "1:138250223666:web:997b7ed4572f717354fc2b"
        };
        firebase.initializeApp(firebaseConfig);

        window.onload = () => {
            const savedEmail = localStorage.getItem("k_worker_saved_email");
            const savedPw = localStorage.getItem("k_worker_saved_pw");
            const autoLogin = localStorage.getItem("k_worker_auto_login") === "true";

            // 1. 계정 정보 저장 기록이 있다면 주입
            if (savedEmail && savedPw) {
                document.getElementById("login-email").value = savedEmail;
                document.getElementById("login-pw").value = savedPw;
                document.getElementById("chk-save-creds").checked = true;
            }

            if (autoLogin) {
                document.getElementById("chk-auto-login").checked = true;
                
                // 2. [자동 로그인] 활성화 상태 시, 인증 상태 감지 후 즉시 메인 리다이렉트
                firebase.auth().onAuthStateChanged((user) => {
                    if (user) {
                        location.replace("main.html");
                    }
                });
            }
        };

        function handleLogin() {
            const email = document.getElementById("login-email").value.trim();
            const pw = document.getElementById("login-pw").value;
            const chkSave = document.getElementById("chk-save-creds").checked;
            const chkAuto = document.getElementById("chk-auto-login").checked;

            if(!email || !pw) return showAlert("이메일과 비밀번호를 모두 입력해 주세요.");

            // 🚨 파이어베이스 로그인 세션 유지 정책 조정 (자동로그인 체크 유무에 따름)
            const persistence = chkAuto ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;

            firebase.auth().setPersistence(persistence)
                .then(() => {
                    return firebase.auth().signInWithEmailAndPassword(email, pw);
                })
                .then((userCredential) => {
                    // 로그인 성공 시 로컬 세팅 동기화
                    if (chkSave) {
                        localStorage.setItem("k_worker_saved_email", email);
                        localStorage.setItem("k_worker_saved_pw", pw);
                    } else {
                        localStorage.removeItem("k_worker_saved_email");
                        localStorage.removeItem("k_worker_saved_pw");
                    }

                    if (chkAuto) {
                        localStorage.setItem("k_worker_auto_login", "true");
                    } else {
                        localStorage.removeItem("k_worker_auto_login");
                    }

                    location.replace("main.html");
                })
                .catch((error) => {
                    console.error(error);
                    showAlert("로그인 실패: 계정 정보가 일치하지 않거나 서버 오류입니다.");
                });
        }

        function showAlert(desc) {
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'block';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        // 🚨 [추가] 팝업 열기/닫기 로직
function openSignupModal() {
    document.getElementById('signup-modal').style.display = 'flex';
}
function closeSignupModal() {
    document.getElementById('signup-modal').style.display = 'none';
}

// 🚨 [추가] 회원가입 처리 로직 (기존 signup.html의 기능을 여기로 통합)
function handleSignup() {
    const email = document.getElementById("signup-email").value.trim();
    const pw = document.getElementById("signup-pw").value;
    const pwConfirm = document.getElementById("signup-pw-confirm").value;

    if(!email || !pw) return showAlert("모든 항목을 입력해 주세요.");
    if(pw !== pwConfirm) return showAlert("비밀번호가 일치하지 않습니다.");
    if(pw.length < 6) return showAlert("비밀번호는 최소 6자 이상이어야 합니다.");

    firebase.auth().createUserWithEmailAndPassword(email, pw)
        .then(() => {
            alert("가입 성공! 이제 로그인하세요.");
            closeSignupModal(); // 가입 성공 시 팝업 닫기
        })
        .catch((error) => {
            showAlert("가입 실패: " + error.message);
        });
}
        
    </script>
</body>
</html>
