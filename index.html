<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-color: #0ea5e9;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 로그인 섹션 전용 디자인 */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px; text-align: center;
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; }
        .slogan { font-size: 14px; color: var(--text-sub); margin-bottom: 50px; }
        #start-btn {
            width: 100%; max-width: 300px; padding: 18px; border: none; border-radius: 12px;
            font-weight: 600; background: var(--accent-color); color: #fff;
            font-size: 18px; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.3);
        }
        #start-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">K-직장인 키우기</div>
        <div class="slogan">여기선 부자가 되어보자!</div>
        <button id="start-btn">시작하기</button>
    </div>

    <script>
        const SAVE_KEY = "k_worker_tycoon_save_data";

        window.onload = () => {
            // 저장된 데이터가 있으면 '이어하기'로 변경
            if (localStorage.getItem(SAVE_KEY)) {
                document.getElementById('start-btn').innerText = "이어하기";
            }

            // 버튼 누르면 실제 게임 화면(main.html)으로 이동
            document.getElementById('start-btn').onclick = () => {
                location.href = 'main.html';
            };
        };
    </script>
</body>
</html>
