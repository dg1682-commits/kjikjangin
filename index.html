<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-color: #0ea5e9;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
        }

        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 30px; text-align: center;
        }
        .logo { font-size: 34px; font-weight: 800; color: var(--accent-color); margin-bottom: 10px; letter-spacing: -0.5px; }
        .slogan { font-size: 14px; color: var(--text-sub); margin-bottom: 35px; font-weight: 600; }
        
        /* 토스사 스타일의 깔끔하고 슬림한 입력창 영역 컴포넌트 */
        .input-container {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }
        .login-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            background: #ffffff;
            color: var(--text-main);
            transition: border-color 0.2s;
        }
        .login-input:focus {
            border-color: var(--accent-color);
        }

        /* 상태 알림용 에러 메시지 라벨 */
        #error-msg {
            font-size: 12px;
            color: var(--danger);
            font-weight: 700;
            margin-bottom: 15px;
            height: 18px;
        }

        #start-btn {
            width: 100%; max-width: 320px; padding: 16px; border: none; border-radius: 12px;
            font-weight: 700; background: var(--accent-color); color: #fff;
            font-size: 16px; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
            margin-bottom: 12px;
        }
        #start-btn:active { transform: scale(0.97); }

        /* 회원가입으로 토글하는 슬림 서브 링크 버튼 */
        .switch-mode-text {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo">K-직장인 키우기</div>
        <div class="slogan">여기선 부자가 되어보자!</div>
        
        <div class="input-container">
            <input type="email" id="user-email" class="login-input" placeholder="이메일 주소 입력">
            <input type="password" id="user-password" class="login-input" placeholder="비밀번호 입력 (6자리 이상)">
        </div>

        <div id="error-msg"></div>

        <button id="start-btn">로그인 및 시작</button>
        <span class="switch-mode-text" id="mode-switch-btn" onclick="toggleAuthMode()">계정이 없으신가요? 회원가입하기</span>
    </div>

    <script>
        const SAVE_KEY = "k_worker_tycoon_save_data";
        let isSignUpMode = false; 

        // 🚨 [연동 완료] 주임님이 발급받으신 파이어베이스 실제 클라우드 키값 세팅
        const firebaseConfig = {
            apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",
            authDomain: "kkkjikjang.firebaseapp.com",
            projectId: "kkkjikjang",
            storageBucket: "kkkjikjang.firebasestorage.app",
            messagingSenderId: "138250223666",
            appId: "1:138250223666:web:997b7ed4572f717354fc2b"
        };

        // 파이어베이스 엔진 초기 가동
        if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("🚨")) {
            firebase.initializeApp(firebaseConfig);
        }

        window.onload = () => {
            if (localStorage.getItem(SAVE_KEY)) {
                document.getElementById('start-btn').innerText = "내 계정으로 이어하기";
            }

            document.getElementById('start-btn').onclick = () => {
                handleAuthAction();
            };
        };

        // 로그인 모드 ↔ 회원가입 모드 UI 동적 스위칭 트랜지션 함수
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const startBtn = document.getElementById('start-btn');
            const switchBtn = document.getElementById('mode-switch-btn');
            const errorLabel = document.getElementById('error-msg');
            
            errorLabel.innerText = ""; 
            
            if (isSignUpMode) {
                startBtn.innerText = "새 계정으로 회원가입 및 시작";
                switchBtn.innerText = "이미 계정이 있으신가요? 로그인하기";
            } else {
                startBtn.innerText = localStorage.getItem(SAVE_KEY) ? "내 계정으로 이어하기" : "로그인 및 시작";
                switchBtn.innerText = "계정이 없으신가요? 회원가입하기";
            }
        }

        // 파이어베이스 계정 연동 및 클라우드 세이브 바인딩 실행 함수
        function handleAuthAction() {
            const email = document.getElementById('user-email').value.trim();
            const password = document.getElementById('user-password').value;
            const errorLabel = document.getElementById('error-msg');

            if (!email || !password) {
                errorLabel.innerText = "이메일과 비밀번호를 모두 입력해 주세요.";
                return;
            }
            if (password.length < 6) {
                errorLabel.innerText = "보안을 위해 비밀번호는 6자리 이상 입력해 주세요.";
                return;
            }

            errorLabel.innerText = "서버 통신 중...";

            if (isSignUpMode) {
                // 1. 회원가입 프로세스 작동
                firebase.auth().createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        let user = userCredential.user;
                        let localData = JSON.parse(localStorage.getItem(SAVE_KEY)) || { money: 10000000, gameSeconds: 0 };
                        
                        // Firestore 클라우드 원격지에 회원 정보 문서 저장
                        firebase.firestore().collection("users").doc(user.uid).set(localData)
                            .then(() => {
                                localStorage.setItem(SAVE_KEY, JSON.stringify(localData));
                                location.href = 'main.html';
                            })
                            .catch(() => {
                                location.href = 'main.html'; 
                            });
                    })
                    .catch((error) => {
                        errorLabel.innerText = getFirebaseErrorMessage(error.code);
                    });
            } else {
                // 2. 로그인 및 데이터 동기화 클라우드 로드 작동
                firebase.auth().signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        let user = userCredential.user;
                        
                        // 원격 서버 클라우드에 있던 이전 데이터 호출 원본 복구
                        firebase.firestore().collection("users").doc(user.uid).get()
                            .then((doc) => {
                                if (doc.exists) {
                                    localStorage.setItem(SAVE_KEY, JSON.stringify(doc.data()));
                                }
                                location.href = 'main.html';
                            })
                            .catch(() => {
                                location.href = 'main.html';
                            });
                    })
                    .catch((error) => {
                        errorLabel.innerText = getFirebaseErrorMessage(error.code);
                    });
            }
        }

        // 파이어베이스 에러 코드 한글 변환 번역기 유틸
        function getFirebaseErrorMessage(code) {
            switch (code) {
                case 'auth/invalid-email': return '유효하지 않은 이메일 형식입니다.';
                case 'auth/user-disabled': return '정지된 계정입니다. 관리자에게 문의하세요.';
                case 'auth/user-not-found': return '등록되지 않은 계정입니다. 회원가입을 해주세요.';
                case 'auth/wrong-password': return '비밀번호가 올바르지 않습니다.';
                case 'auth/email-already-in-use': return '이미 사용 중인 이메일 주소입니다.';
                case 'auth/weak-password': return '비밀번호 강도가 너무 약합니다.';
                default: return '계정 통신 오류가 발생했습니다. 다시 시도해 주세요.';
            }
        }
    </script>
</body>
</html>
