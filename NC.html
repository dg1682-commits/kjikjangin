<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>눈치눈치 - 부장님 눈치 피하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        /* [패치] 전체 터치 방지 및 레이아웃 확대 */
        body { margin: 0; background: #0f172a; color: white; font-family: 'Pretendard', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: manipulation; }
        
        .boss-box { width: 200px; height: 200px; background: #1e293b; border-radius: 40px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; font-size: 80px; border: 6px solid #06b6d4; }
        .score-board { font-size: 32px; margin-bottom: 15px; color: #06b6d4; font-weight: bold; }
        .work-btn { padding: 40px 80px; font-size: 32px; background: #f59e0b; border: none; border-radius: 25px; cursor: pointer; color: white; font-weight: 900; transition: 0.1s; }
        .work-btn:active { transform: scale(0.95); background: #d97706; }
        
        /* [패치] 게임오버 모달 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 40px; border-radius: 25px; border: 4px solid #f43f5e; width: 80%; max-width: 400px; }
        .modal-btn { width: 100%; padding: 20px; font-size: 20px; border-radius: 15px; margin: 10px 0; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="score-board">BEST: <span id="best-score">0</span></div>
<div class="score-board">현재 점수: <span id="current-score">0</span></div>
<div id="boss-status" class="boss-box">😎</div>
<div id="status-text" style="margin-bottom: 40px; font-size: 24px;">열심히 일하는 중...</div>
<button class="work-btn" onclick="work()">업무 클릭!</button>

<div id="gameover-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #f43f5e;">게임 오버!</h2>
        <p id="result-text" style="font-size: 18px;"></p>
        <button class="modal-btn" style="background:#06b6d4; color:white;" onclick="retryGame()">재시도 (100원)</button>
        <button class="modal-btn" style="background:#64748b; color:white;" onclick="location.replace('game.html')">나가기</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;
    let score = 0;
    let highScore = 0;
    let isBossWatching = false;

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    highScore = doc.data().highScore || 0;
                    document.getElementById('best-score').innerText = highScore;
                }
            });
        }
    });

    setInterval(() => {
        isBossWatching = !isBossWatching;
        document.getElementById('boss-status').innerText = isBossWatching ? '😠' : '😎';
        document.getElementById('status-text').innerText = isBossWatching ? '부장님이 쳐다본다!!' : '열심히 일하는 중...';
    }, Math.random() * 1500 + 1500);

    function work() {
        if (isBossWatching) {
            gameOver();
        } else {
            score += 10;
            document.getElementById('current-score').innerText = score;
            if (score > highScore) {
                highScore = score;
                document.getElementById('best-score').innerText = highScore;
                db.collection("users").doc(currentUser.uid).update({ highScore: highScore });
            }
        }
    }

    function gameOver() {
        const earnings = Math.floor(score * 1.2);
        document.getElementById('result-text').innerText = `최종 점수: ${score}점\n획득 보상: ${earnings.toLocaleString()}원`;
        document.getElementById('gameover-modal').style.display = 'flex';
        
        // 보상 지급
        if (score > 0) {
            db.collection("users").doc(currentUser.uid).get().then(doc => {
                const currentMoney = Number(doc.data().money || 0);
                db.collection("users").doc(currentUser.uid).update({ money: currentMoney + earnings });
            });
        }
        score = 0;
        document.getElementById('current-score').innerText = score;
    }

    function retryGame() {
        db.collection("users").doc(currentUser.uid).get().then(doc => {
            const money = Number(doc.data().money || 0);
            if (money >= 100) {
                db.collection("users").doc(currentUser.uid).update({ money: money - 100 });
                document.getElementById('gameover-modal').style.display = 'none';
            } else {
                alert("돈이 부족합니다!");
            }
        });
    }
</script>
</body>
</html>
