<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>눈치눈치 - 부장님 눈치 피하기</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Pretendard', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .boss-box { width: 120px; height: 120px; background: #1e293b; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 3px solid #06b6d4; }
        .score-board { font-size: 24px; margin-bottom: 10px; color: #06b6d4; }
        .work-btn { padding: 25px 50px; font-size: 24px; background: #f59e0b; border: none; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .work-btn:active { transform: scale(0.95); }
        .back-btn { margin-top: 20px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="score-board">BEST: <span id="best-score">0</span></div>
<div class="score-board">현재 점수: <span id="current-score">0</span></div>
<div id="boss-status" class="boss-box">😎</div>
<div id="status-text" style="margin-bottom: 20px;">열심히 일하는 중...</div>
<button class="work-btn" onclick="work()">업무 클릭!</button>
<div class="back-btn" onclick="goBackWithReward()">뒤로가기 (보상 수령)</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",
        authDomain: "kkkjikjang.firebaseapp.com",
        projectId: "kkkjikjang",
        storageBucket: "kkkjikjang.firebasestorage.app",
        messagingSenderId: "138250223666",
        appId: "1:138250223666:web:997b7ed4572f717354fc2b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null;
    let score = 0;
    let highScore = 0;
    let isBossWatching = false;

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            currentUser = user;
            db.collection("users").doc(user.uid).get().then(doc => {
                if (doc.exists) {
                    highScore = doc.data().highScore || 0;
                    document.getElementById('best-score').innerText = highScore;
                }
            });
        }
    });

    setInterval(() => {
        isBossWatching = !isBossWatching;
        document.getElementById('boss-status').innerText = isBossWatching ? '😠' : '😎';
        document.getElementById('status-text').innerText = isBossWatching ? '부장님이 쳐다본다!!' : '열심히 일하는 중...';
    }, Math.random() * 1500 + 1500);

    function work() {
        if (isBossWatching) {
            alert("걸렸다!! 야근 확정! 점수가 초기화됩니다.");
            score = 0;
        } else {
            score += 10;
        }
        document.getElementById('current-score').innerText = score;
        
        if (score > highScore) {
            highScore = score;
            document.getElementById('best-score').innerText = highScore;
            db.collection("users").doc(currentUser.uid).update({ highScore: highScore });
        }
    }

    function goBackWithReward() {
        if (score > 0) {
            const earnings = Math.floor(score * 1.2);
            db.collection("users").doc(currentUser.uid).get().then(doc => {
                const currentMoney = Number(doc.data().money || 0);
                db.collection("users").doc(currentUser.uid).update({
                    money: currentMoney + earnings
                }).then(() => {
                    alert(earnings.toLocaleString() + "원이 입금되었습니다!");
                    location.replace('game.html'); // 오락실로 복귀
                });
            });
        } else {
            location.replace('game.html');
        }
    }
</script>
</body>
</html>
