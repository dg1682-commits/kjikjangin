<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>눈치눈치 - 모바일 최적화 패치</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Pretendard', sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        /* [최적화] 부장님 캐릭터 이동 영역 */
        #boss-container { position: absolute; top: 15%; left: -150px; width: 120px; height: 120px; z-index: 10; transition: left 0.5s linear; }
        #boss-img { width: 100%; height: 100%; object-fit: contain; }
        
        .score-board { margin-top: 50px; font-size: 20px; color: #06b6d4; font-weight: bold; width: 100%; }
        .work-btn { width: 80%; height: 180px; font-size: 32px; background: #f59e0b; border: none; border-radius: 25px; cursor: pointer; color: white; font-weight: 900; margin-top: auto; margin-bottom: 50px; }
        .work-btn:active { transform: scale(0.95); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 25px; border: 4px solid #f43f5e; width: 85%; }
        .modal-btn { width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; margin: 10px 0; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="score-board">BEST: <span id="best-score">0</span> | 점수: <span id="current-score">0</span></div>

<div id="boss-container">
    <img id="boss-img" src="캐릭터/60대.png" alt="부장님">
</div>

<div id="status-text" style="margin-top: 100px; font-size: 20px;">업무 중...</div>
<button class="work-btn" onclick="work()">업무 클릭!</button>

<div id="gameover-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: #f43f5e;">게임 오버!</h2>
        <p id="result-text" style="font-size: 18px;"></p>
        <button class="modal-btn" style="background:#06b6d4; color:white;" onclick="retryGame()">재시도 (100원)</button>
        <button class="modal-btn" style="background:#64748b; color:white;" onclick="location.replace('game.html')">나가기</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null, score = 0, highScore = 0, isWatching = false;

    firebase.auth().onAuthStateChanged(user => { if (user) { currentUser = user; db.collection("users").doc(user.uid).get().then(doc => { if(doc.exists) { highScore = doc.data().highScore || 0; document.getElementById('best-score').innerText = highScore; } }); } });

    function moveBoss() {
        const boss = document.getElementById('boss-container');
        const screenWidth = window.innerWidth;
        const duration = Math.random() * 2000 + 1000;
        
        boss.style.transition = `left ${duration/1000}s linear`;
        boss.style.left = (screenWidth + 100) + "px";
        
        setTimeout(() => {
            isWatching = true;
            document.getElementById('status-text').innerText = '부장님이 쳐다본다!!';
            document.getElementById('boss-img').style.transform = "scale(1.2)";
        }, duration * 0.4);

        setTimeout(() => {
            isWatching = false;
            document.getElementById('status-text').innerText = '업무 중...';
            document.getElementById('boss-img').style.transform = "scale(1)";
            boss.style.left = "-150px";
            setTimeout(moveBoss, 500);
        }, duration * 0.4 + 1200);
    }

    function work() {
        if (isWatching) { gameOver(); } 
        else {
            score += 10;
            document.getElementById('current-score').innerText = score;
            if (score > highScore) { highScore = score; document.getElementById('best-score').innerText = highScore; db.collection("users").doc(currentUser.uid).update({ highScore: highScore }); }
        }
    }

    function gameOver() {
        const earnings = Math.floor(score * 1.2);
        document.getElementById('result-text').innerText = `점수: ${score}점\n획득: ${earnings.toLocaleString()}원`;
        document.getElementById('gameover-modal').style.display = 'flex';
        if (score > 0) { db.collection("users").doc(currentUser.uid).get().then(doc => { const currentMoney = Number(doc.data().money || 0); db.collection("users").doc(currentUser.uid).update({ money: currentMoney + earnings }); }); }
        score = 0; document.getElementById('current-score').innerText = score;
    }

    function retryGame() {
        db.collection("users").doc(currentUser.uid).get().then(doc => {
            const money = Number(doc.data().money || 0);
            if (money >= 100) { db.collection("users").doc(currentUser.uid).update({ money: money - 100 }); document.getElementById('gameover-modal').style.display = 'none'; } 
            else { alert("돈이 부족합니다!"); }
        });
    }

    window.onload = () => { setTimeout(moveBoss, 1000); };
</script>
</body>
</html>
