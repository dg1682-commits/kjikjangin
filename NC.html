<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>눈치눈치 - K-Working 밸런스 패치</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #0a0e1b; 
            --card-bg: #1e293b;
            --accent-color: #06b6d4; 
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --danger: #f43f5e; 
            --success: #10b981;
            --warning: #f59e0b;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); /* 배경 이미지 로딩 전 또는 실패 시 fallback 색상 유지 */
            background-image: url('arcade/NC/NCbg.jpeg'); /* 지정된 배경 이미지 적용 */
            background-size: cover; /* 화면을 꽉 채우도록 설정 */
            background-position: center; /* 이미지를 가운데 정렬 */
            background-repeat: no-repeat; /* 이미지 반복 안 함 */
            color: var(--text-main); 
            font-family: 'Pretendard', sans-serif; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation; 
        }
        
        .header-bar {
            width: 100%;
            margin-top: 20px; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.9) 0%, rgba(10, 14, 27, 0.98) 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.45);
            box-sizing: border-box;
            border-bottom: 2px solid #3b2d66;
            z-index: 50;
        }
        
        .score-info { display: flex; flex-direction: column; align-items: start; gap: 4px; border-left: 5px solid var(--accent-color); padding-left: 12px; }
        .score-info.best { border-color: var(--success); }
        .score-info .score-label { font-size: 11px; color: var(--text-sub); font-weight: 800; }
        .score-info .score-value { font-size: 24px; font-weight: 900; line-height: 1.1; }
        
        #boss-container { position: absolute; top: 18vh; left: -150px; width: 110px; height: 110px; z-index: 10; pointer-events: none; }
        #boss-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.1s ease; filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.4)); }
        
        #radar-section {
            position: absolute;
            top: 18vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 110px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #view-zone {
            width: 100%;
            height: 100%;
            border: 4px solid var(--accent-color);
            border-radius: 20px;
            background: rgba(6, 182, 212, 0.03);
            box-sizing: border-box;
            transition: all 0.15s ease;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
            display: flex; align-items: center; justify-content: center;
        }

        #zone-status-overlay {
            position: absolute;
            width: max-content;
            font-size: 10px;
            font-weight: 800;
            color: var(--accent-color);
            background: rgba(10,14,27,0.85);
            padding: 3px 6px;
            border-radius: 6px;
            bottom: -22px;
            transition: all 0.15s;
        }

        #view-zone.active {
            border-color: var(--danger);
            box-shadow: 0 0 30px rgba(244, 63, 94, 0.8), inset 0 0 15px rgba(244, 63, 94, 0.3);
            background: rgba(244, 63, 94, 0.25);
            animation: radar-pulse 1.2s ease-in-out infinite alternate;
        }
        
        @keyframes radar-pulse {
            0% { box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); }
            100% { box-shadow: 0 0 40px rgba(244, 63, 94, 1.0); }
        }

        #zone-status-overlay.active { color: var(--danger); }

        #status-text {
            font-size: 20px; font-weight: 800; 
            color: var(--text-main);
            transition: color 0.15s;
            line-height: 1.4;
            letter-spacing: -0.5px;
            position: absolute;
            bottom: 270px; 
            width: 80%;
            text-align: center;
        }
        
        .work-btn { 
            width: 85%; height: 180px; 
            font-size: 36px; background: linear-gradient(180deg, rgba(245, 158, 11, 1) 0%, rgba(180, 83, 9, 1) 100%); 
            border: none; border-radius: 25px; cursor: pointer; color: white; font-weight: 900; 
            margin-top: auto; margin-bottom: 40px;
            z-index: 100;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 0 #b45309; transition: transform 0.05s, box-shadow 0.05s, background 0.15s;
            letter-spacing: -1px;
            text-shadow: 0 3px 0 rgba(0,0,0,0.5);
        }
        
        .work-btn:active { 
            transform: scale(0.97) translateY(4px) translateX(-50%); 
            box-shadow: 0 4px 0 #b45309;
            background: linear-gradient(180deg, rgba(217, 119, 6, 1) 0%, rgba(180, 83, 9, 1) 100%);
        }
        
        .work-btn.disabled { 
            background: linear-gradient(180deg, #64748b 0%, #475569 100%); 
            box-shadow: 0 10px 0 #334155; 
            text-shadow: none; 
            opacity: 0.8; 
        }

        .active-time-bar-container { width: 85%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: fixed; bottom: 212px; left: 50%; transform: translateX(-50%); z-index: 99; overflow: hidden; }
        .active-time-bar { height: 100%; background: rgba(255,255,255,0.3); width: 0%; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 14, 27, 0.92); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { 
            background: var(--card-bg); padding: 30px 25px; border-radius: 25px; 
            border: 4px solid var(--danger); width: 85%; max-width: 330px;
            box-shadow: 0 10px 50px rgba(244, 63, 94, 0.7);
        }
        .modal-title { font-size: 24px; color: var(--danger); font-weight: 900; margin-top: 0; margin-bottom: 15px; letter-spacing: -1px; text-shadow: 0 0 15px rgba(244, 63, 94, 0.6); }
        #result-text { font-size: 18px; line-height: 1.5; color: var(--text-main); font-weight: 600; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 25px; border-left: 3px solid var(--danger); white-space: pre-wrap; }
        
        .modal-btn { 
            width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; margin: 10px 0; 
            font-weight: 800; cursor: pointer; border: none; font-family: 'Pretendard', sans-serif;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .modal-btn.retry { background: linear-gradient(180deg, var(--accent-color) 0%, #0369a1 100%); color: white; text-shadow: 0 1px 0 rgba(0,0,0,0.3); }
        .modal-btn.exit { background: linear-gradient(180deg, #475569 0%, #1e293b 100%); color: var(--text-sub); }
        .modal-btn:active { transform: scale(0.97) translateY(2px); }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="score-info best">
            <span class="score-label">최고 기록 수당</span>
            <span class="score-value" id="best-score">0</span>
        </div>
        <div class="score-info">
            <span class="score-label">현재 적립 수당</span>
            <span class="score-value" id="current-score">0</span>
        </div>
    </div>

    <div id="radar-section">
        <div id="view-zone">
            <span id="zone-status-overlay">SAFE</span>
        </div>
    </div>

    <div id="boss-container">
        <img id="boss-img" src="캐릭터/60대.png" alt="부장님">
    </div>

    <div id="status-text">서류 마감을 위해 업무를 집중적으로 처리하고 있습니다...</div>

    <div class="active-time-bar-container">
        <div class="active-time-bar" id="active-time-bar"></div>
    </div>
    <button class="work-btn" id="work-btn" onclick="work()">업무 연타!!</button>

    <div id="gameover-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">⚠️ 근무태만 적발!</h2>
            <p id="result-text"></p>
            <button class="modal-btn retry" onclick="retryGame()">재시도 (100원)</button>
            <button class="modal-btn exit" onclick="location.replace('game.html')">나가기</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = null, score = 0, highScore = 0, isWatching = false;
    
    let gameActive = true;
    let bossTimerRef = null;

    firebase.auth().onAuthStateChanged(user => { if (user) { currentUser = user; db.collection("users").doc(user.uid).get().then(doc => { if(doc.exists) { highScore = doc.data().highScore || 0; document.getElementById('best-score').innerText = highScore; } }); } });

    function moveBoss() {
        if (!gameActive) return;
        
        const boss = document.getElementById('boss-container');
        const screenWidth = window.innerWidth;
        
        if (bossTimerRef) clearTimeout(bossTimerRef);

        const duration = Math.random() * 1900 + 1300;
        
        boss.style.transition = `left ${duration/1000}s linear`;
        boss.style.left = (screenWidth + 160) + "px";
        
        bossTimerRef = setTimeout(() => {
            if (!gameActive) return;
            boss.style.transition = 'none';
            boss.style.left = "-150px";
            
            bossTimerRef = setTimeout(moveBoss, Math.random() * 1200 + 500);
        }, duration);
    }

    function launchRealtimeRadarScanner() {
        if (!gameActive) {
            requestAnimationFrame(launchRealtimeRadarScanner);
            return;
        }

        const boss = document.getElementById('boss-container');
        const zone = document.getElementById('view-zone');
        const zoneOverlay = document.getElementById('zone-status-overlay');
        const statusText = document.getElementById('status-text');
        const workBtn = document.getElementById('work-btn');
        const bossImg = document.getElementById('boss-img');

        const bossRect = boss.getBoundingClientRect();
        const zoneRect = zone.getBoundingClientRect();

        if (bossRect.right > zoneRect.left + 25 && bossRect.left < zoneRect.right - 25) {
            isWatching = true;
            statusText.innerText = '⚠️ 부장님과 눈이 딱 마주쳤습니다!!! 정지하세요!';
            statusText.style.color = 'var(--danger)';
            zone.classList.add('active');
            zoneOverlay.classList.add('active');
            zoneOverlay.innerText = '🚨 RED Zone';
            bossImg.style.transform = "scale(1.25) rotate(-8deg)";
            workBtn.classList.add('disabled'); 
        } else {
            isWatching = false;
            statusText.innerText = '열심히 서류 마감 작업 중... (연타하세요)';
            statusText.style.color = 'var(--text-main)';
            zone.classList.remove('active');
            zoneOverlay.classList.remove('active');
            zoneOverlay.innerText = '안전 구역';
            bossImg.style.transform = "scale(1) rotate(0deg)";
            workBtn.classList.remove('disabled'); 
        }

        requestAnimationFrame(launchRealtimeRadarScanner);
    }

    function work() {
        if (!gameActive) return;
        
        if (isWatching) { 
            gameOver(); 
        } else {
            score += 10;
            document.getElementById('current-score').innerText = score;
            if (score > highScore) { 
                highScore = score; 
                document.getElementById('best-score').innerText = highScore; 
                db.collection("users").doc(currentUser.uid).update({ highScore: highScore }); 
            }
        }
    }

    function gameOver() {
        gameActive = false;
        if (bossTimerRef) clearTimeout(bossTimerRef);
        
        const boss = document.getElementById('boss-container');
        boss.style.transition = 'none';

        const earnings = Math.floor(score * 1.2);
        document.getElementById('result-text').innerText = `최종 점수: ${score}점\n💰 지급 수당: +${earnings.toLocaleString()}원`;
        document.getElementById('gameover-modal').style.display = 'flex';
        
        if (score > 0) { db.collection("users").doc(currentUser.uid).get().then(doc => { const currentMoney = Number(doc.data().money || 0); db.collection("users").doc(currentUser.uid).update({ money: currentMoney + earnings }); }); }
        score = 0; 
        document.getElementById('current-score').innerText = score;
    }

    function retryGame() {
        db.collection("users").doc(currentUser.uid).get().then(doc => {
            const money = Number(doc.data().money || 0);
            if (money >= 100) { 
                db.collection("users").doc(currentUser.uid).update({ money: money - 100 }); 
                document.getElementById('gameover-modal').style.display = 'none'; 
                
                gameActive = true;
                const boss = document.getElementById('boss-container');
                boss.style.transition = 'none';
                boss.style.left = "-150px";
                
                setTimeout(moveBoss, 800);
            } else { 
                alert("돈이 부족합니다! (시도당 100원)"); 
            }
        });
    }

    window.onload = () => { 
        setTimeout(moveBoss, 1000); 
        launchRealtimeRadarScanner(); 
    };
</script>
</body>
</html>
