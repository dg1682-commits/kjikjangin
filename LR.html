<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>K-직장인 키우기 - 니꺼내꺼 v1.1</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>

        :root {

            --sky-blue: #38bdf8;

            --fever-bg: #1e1b4b;

            --neon-pink: #f43f5e;

            --neon-yellow: #facc15;

            --text-light: #ffffff;

        }



        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        

body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: 'Pretendard', sans-serif;
    background: url('arcade/LR/LRbg.png') no-repeat center center / cover; /* 🚨 경로 수정 */
    color: var(--text-light);
    overflow: hidden;
    touch-action: manipulation;
    transition: background-color 0.3s;
}



        /* 🚨 [추가] 피버타임 화면 테두리 노란색 네온 효과 */

        body.fever-active {

            background-color: var(--fever-bg);

            box-shadow: inset 0 0 40px var(--neon-yellow), inset 0 0 100px rgba(250, 204, 21, 0.3);

            animation: fever-glow 0.5s infinite alternate;

        }

        @keyframes fever-glow {

            from { box-shadow: inset 0 0 20px var(--neon-yellow); }

            to { box-shadow: inset 0 0 60px var(--neon-yellow); }

        }



        header {

            position: fixed; top: 0; left: 0; width: 100%; height: 50px;

            display: flex; align-items: center; justify-content: space-between;

            padding: 0 15px; background: rgba(0, 0, 0, 0.15);

            backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.1);

            z-index: 100;

        }

        .back-btn { font-size: 22px; font-weight: bold; color: var(--text-light); text-decoration: none; }



        main { padding-top: 50px; height: 100%; display: flex; flex-direction: column; align-items: center; position: relative; }



        /* 대시보드 */

        .dashboard-layer {

            width: 90%; max-width: 360px; display: flex; justify-content: space-between;

            margin-top: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 10px;

        }

        .dash-card { display: flex; flex-direction: column; align-items: center; width: 48%; }

        .dash-lbl { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: bold; }

        .dash-val { font-size: 18px; font-weight: 900; }



        #fever-banner {

            font-size: 32px; font-weight: 900; color: var(--neon-yellow);

            text-shadow: 0 0 15px var(--neon-pink);

            display: none; animation: bounce 0.3s infinite alternate;

            position: absolute; top: 80px; z-index: 80;

        }

        @keyframes bounce { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }



        /* 중앙 게임판 */

        .game-conveyor-belt {

            width: 100%; max-width: 400px; flex-grow: 1;

            display: flex; justify-content: center; align-items: flex-end;

            position: relative; margin-bottom: 15px;

        }



        #object-stack-pool {

            position: relative; width: 100%; display: flex; flex-direction: column-reverse;

            align-items: center; z-index: 20; padding-bottom: 20px;

        }



        .obj-unit {

            width: 70px; height: 70px; object-fit: contain;

            margin-bottom: 10px; transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        }



        /* 🚨 [추가] 맞췄을 때 팡! 터지는 효과 */

        .hit-effect {

            animation: hit-pop 0.3s forwards;

        }

        @keyframes hit-pop {

            0% { transform: scale(1); opacity: 1; }

            100% { transform: scale(1.8) translateY(-50px); opacity: 0; }

        }



        /* 🚨 [추가] 틀렸을 때 띵~ 좌우 흔들림 효과 */

        .fail-shake {

            filter: grayscale(1) brightness(0.5) sepia(1) saturate(10000%) hue-rotate(-50deg);

            animation: shake 0.1s 5; /* 0.1초 * 5회 = 0.5초 지속 */

        }

        @keyframes shake {

            0% { transform: translateX(0); }

            25% { transform: translateX(-10px); }

            75% { transform: translateX(10px); }

            100% { transform: translateX(0); }

        }



        /* 가이드 패널 (현재 활성화된 캐릭터만 표시) */

        .side-guide-panel {

            position: absolute; bottom: 20px; width: 85px; min-height: 120px;

            background: rgba(255,255,255,0.2); border: 2.5px solid #fff;

            border-radius: 16px; display: flex; flex-direction: column;

            align-items: center; padding: 10px 5px; gap: 5px; z-index: 15;

            box-shadow: 0 5px 15px rgba(0,0,0,0.2);

        }

        .side-guide-panel.left-wing { left: 10px; }

        .side-guide-panel.right-wing { right: 10px; }

        .guide-lbl { font-size: 11px; font-weight: 800; color: #fff; margin-bottom: 5px; }

        .guide-thumb { width: 35px; height: 35px; object-fit: contain; }



        /* 하단 버튼 */

        .action-pad-layer {

            width: 100%; display: flex; background: rgba(0, 0, 0, 0.3);

            padding: 15px; gap: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));

        }

        .pad-trigger-btn {

            flex: 1; padding: 22px; font-size: 22px; font-weight: 900; color: #fff;

            border-radius: 18px; border: none; cursor: pointer;

            box-shadow: 0 6px 0 rgba(0,0,0,0.3);

        }

        .pad-trigger-btn.btn-left { background: linear-gradient(135deg, #f43f5e, #e11d48); }

        .pad-trigger-btn.btn-right { background: linear-gradient(135deg, #0ea5e9, #0284c7); }

        .pad-trigger-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }



        /* 오버레이 */

        .game-curtain-overlay {

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

            background: rgba(15, 10, 28, 0.95); z-index: 500;

            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px;

        }

        .curtain-box {

            width: 100%; max-width: 320px; background: #1e1538; border: 2px solid var(--neon-purple);

            border-radius: 20px; padding: 25px; text-align: center;

        }

        .curtain-title { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: var(--neon-yellow); }

        .curtain-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }

        .curtain-start-btn {

            width: 100%; padding: 15px; background: linear-gradient(135deg, var(--neon-pink), #a855f7);

            color: #fff; font-size: 16px; font-weight: 800; border-radius: 12px; border: none;

        }

        /* 2. 피버타임 바 스타일 추가 */
        #fever-bar-container {
            width: 200px; height: 8px; background: rgba(0,0,0,0.5);
            margin-top: 5px; display: none; overflow: hidden; border-radius: 4px;
        }
        #fever-bar {
            width: 100%; height: 100%; background: var(--neon-yellow);
            transition: width 7s linear; /* 7초 동안 선형으로 줄어듦 */
        }
        
    </style>

</head>

<body>



    <div class="game-curtain-overlay" id="start-curtain">

        <div class="curtain-box">

            <div class="curtain-title">🎯 니꺼내꺼 : v1.1</div>

            <div class="curtain-desc">

                좌우 버튼을 눌러 캐릭터를 분류하세요!<br><br>

                • 💥틀리면: <span style="color:var(--neon-pink);">시간 -5초</span><br>

                • 🔥20콤보: <span style="color:var(--neon-yellow);">피버타임 (맞출 때마다 +1초)</span><br>

                • ⏰1분마다: <span style="color:#4ade80;">새로운 캐릭터 등장 (난이도 UP!)</span>

            </div>

            <button class="curtain-start-btn" onclick="launchMiniGame()">🕹️ 게임 시작 (100원)</button>

        </div>

    </div>



    <header>

        <a href="game.html" class="back-btn" onclick="location.replace('game.html')">←</a>

        <div class="header-title" id="difficulty-lbl">Lv.1 (진행: 00:00)</div>

        <div class="empty-space"></div>

    </header>



    <main>

        <section class="dashboard-layer">

            <div class="dash-card">

                <span class="dash-lbl">TIME</span>

                <span class="dash-val" id="timer-val">60.0</span>

            </div>

            <div class="dash-card" style="border-left: 1px solid rgba(255,255,255,0.2);">

                <span class="dash-lbl">SCORE</span>

                <span class="dash-val" id="score-val">0</span>

            </div>

        </section>



<div id="fever-banner">FEVER TIME</div>
<div id="fever-bar-container"><div id="fever-bar"></div></div>


        <section class="game-conveyor-belt">

            <div class="side-guide-panel left-wing" id="left-guide">

                <span class="guide-lbl">LEFT</span>

            </div>



            <div id="object-stack-pool"></div>



            <div class="side-guide-panel right-wing" id="right-guide">

                <span class="guide-lbl">RIGHT</span>

            </div>

        </section>



        <section class="action-pad-layer">

            <button class="pad-trigger-btn btn-left" onmousedown="hitDirection('L')" ontouchstart="hitDirection('L')">◀ LEFT</button>

            <button class="pad-trigger-btn btn-right" onmousedown="hitDirection('R')" ontouchstart="hitDirection('R')">RIGHT ▶</button>

        </section>

    </main>



    <script>

        const SAVE_KEY = "k_worker_tycoon_save_data";

        let state = { money: 100000 };

        let currentUser = null;



        const firebaseConfig = {

            apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",

            authDomain: "kkkjikjang.firebaseapp.com",

            projectId: "kkkjikjang",

            storageBucket: "kkkjikjang.firebasestorage.app",

            messagingSenderId: "138250223666",

            appId: "1:138250223666:web:997b7ed4572f717354fc2b"

        };

        firebase.initializeApp(firebaseConfig);



        let timeLeft = 60.0;

        let score = 0;

        let combo = 0;

        let gameElapsedSec = 0;

        let isGameRunning = false;

        let gameTimerInterval = null;



        let leftTargets = [1]; 

        let rightTargets = [2];

        let objectQueue = [];

        

        let isFeverMode = false;

        let feverRemainingCount = 0;

        let lastHitTime = 0;

        let isInputLocked = false;

        let feverTimer = null; // 7초 카운트다운용



        const OBJ_ASSETS = {

            1: "arcade/LR/ob1.png", 2: "arcade/LR/ob2.png", 3: "arcade/LR/ob3.png",

            4: "arcade/LR/ob4.png", 5: "arcade/LR/ob5.png", 6: "arcade/LR/ob6.png"

        };



        // 🚨 [난이도 시스템] 시간에 따라 캐릭터 추가

        function updateDifficulty() {

            gameElapsedSec++;

            const minute = Math.floor(gameElapsedSec / 60);

            

            // 1분: 왼쪽 추가(3), 2분: 오른쪽 추가(4), 3분: 왼쪽 추가(5), 4분: 오른쪽 추가(6)

            if (minute === 1 && leftTargets.length === 1) leftTargets.push(3);

            if (minute === 2 && rightTargets.length === 1) rightTargets.push(4);

            if (minute === 3 && leftTargets.length === 2) leftTargets.push(5);

            if (minute === 4 && rightTargets.length === 2) rightTargets.push(6);



            const m = String(Math.floor(gameElapsedSec / 60)).padStart(2, '0');

            const s = String(gameElapsedSec % 60).padStart(2, '0');

            document.getElementById('difficulty-lbl').innerText = `Lv.${minute+1} (진행: ${m}:${s})`;

            

            renderGuides();

        }



        function renderGuides() {

            const lBox = document.getElementById('left-guide');

            const rBox = document.getElementById('right-guide');

            

            lBox.innerHTML = '<span class="guide-lbl">LEFT</span>';

            rBox.innerHTML = '<span class="guide-lbl">RIGHT</span>';

            

            leftTargets.forEach(id => {

                const img = document.createElement('img');

                img.src = OBJ_ASSETS[id]; img.className = 'guide-thumb';

                lBox.appendChild(img);

            });

            rightTargets.forEach(id => {

                const img = document.createElement('img');

                img.src = OBJ_ASSETS[id]; img.className = 'guide-thumb';

                rBox.appendChild(img);

            });

        }



        function refillObjects(count) {

            for(let i=0; i<count; i++) {

                if(isFeverMode) {

                    objectQueue.push(leftTargets[0]); // 피버때는 무조건 첫번째 캐릭만

                } else {

                    const allCurrent = [...leftTargets, ...rightTargets];

                    const rand = allCurrent[Math.floor(Math.random() * allCurrent.length)];

                    objectQueue.push(rand);

                }

            }

        }



        function drawStackDisplay() {

            const pool = document.getElementById('object-stack-pool');

            pool.innerHTML = "";

            let visibleCount = Math.min(objectQueue.length, 6);

            for(let i = 0; i < visibleCount; i++) {

                let img = document.createElement('img');

                img.src = OBJ_ASSETS[objectQueue[i]];

                img.className = "obj-unit";

                if(i === 0) img.id = "current-obj";

                pool.appendChild(img);

            }

        }



        function launchMiniGame() {
            document.getElementById('start-curtain').style.display = 'none';
            timeLeft = 60.0; score = 0; combo = 0; gameElapsedSec = 0;
            isFeverMode = false;
            
            // 🚨 랜덤 배치 실행
            shuffleTargets();
            
            objectQueue = [];
            updateDifficulty();
            refillObjects(15);
            drawStackDisplay();
            
            isGameRunning = true;
            startTimerClock();
        }



        function startTimerClock() {

            let lastTick = Date.now();

            gameTimerInterval = setInterval(() => {

                let now = Date.now();

                let delta = (now - lastTick) / 1000;

                lastTick = now;



                timeLeft = Math.max(0, timeLeft - delta);

                document.getElementById('timer-val').innerText = timeLeft.toFixed(1);



                if(timeLeft % 1 < 0.1) updateDifficulty(); // 매 초마다 난이도 체크



                if(timeLeft <= 0) terminateMiniGame();

            }, 100);

        }



// 🚨 [v1.3] hitDirection 함수 전체 교체

        function hitDirection(dir) {

            const now = Date.now();

            if (isInputLocked || (now - lastHitTime < 150)) return;

            

            lastHitTime = now; 

            if(!isGameRunning || objectQueue.length === 0) return;



            const currentId = objectQueue[0];

            const isLeftCorrect = dir === 'L' && leftTargets.includes(currentId);

            const isRightCorrect = dir === 'R' && rightTargets.includes(currentId);



            if(isLeftCorrect || isRightCorrect) {

                const objEl = document.getElementById('current-obj');

                objEl.classList.add('hit-effect');

                

                setTimeout(() => {

                    objectQueue.shift();

                    score += 10;

                    document.getElementById('score-val').innerText = score;



                    if(isFeverMode) {

                        // 🚨 피버타임 중에는 맞출 때마다 게임 제한 시간 1초 연장

                        timeLeft += 1.0;

                    } else {

                        combo++;

                        if(combo >= 20) enterFeverMode();

                    }

                    

                    if(objectQueue.length < 10) refillObjects(10);

                    drawStackDisplay();

                }, 50);

            } else {

                isInputLocked = true;

                const objEl = document.getElementById('current-obj');

                objEl.classList.add('fail-shake');

                

                timeLeft = Math.max(0, timeLeft - 5.0);

                combo = 0;

                

                // 피버 중 틀리면 즉시 해제

                if(isFeverMode) exitFeverMode();

                

                setTimeout(() => {

                    objEl.classList.remove('fail-shake');

                    isInputLocked = false;

                }, 500);

            }

        }



function enterFeverMode() {
            if(isFeverMode) return; // 이미 피버 중이면 방지
            isFeverMode = true;
            combo = 0;
            
            const feverTarget = (Math.random() < 0.5) ? leftTargets[0] : rightTargets[0];
            objectQueue = [];
            for(let i=0; i<50; i++) objectQueue.push(feverTarget);

            document.body.classList.add('fever-active');
            document.getElementById('fever-banner').style.display = 'block';
            
            // 🚨 [추가] 게이지바 보이기 및 애니메이션 초기화
            const bar = document.getElementById('fever-bar');
            document.getElementById('fever-bar-container').style.display = 'block';
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            // 약간의 딜레이 후 애니메이션 시작
            setTimeout(() => {
                bar.style.transition = 'width 7s linear';
                bar.style.width = '0%';
            }, 50);

            // 7초 후 자동 종료
            if (feverTimer) clearTimeout(feverTimer);
            feverTimer = setTimeout(() => {
                exitFeverMode();
            }, 7000); 

            drawStackDisplay();
        }

        function exitFeverMode() {
            if(!isFeverMode) return;
            
            isFeverMode = false;
            document.body.classList.remove('fever-active');
            document.getElementById('fever-banner').style.display = 'none';
            // 🚨 게이지바 숨기기
            document.getElementById('fever-bar-container').style.display = 'none';
            
            if (feverTimer) {
                clearTimeout(feverTimer);
                feverTimer = null;
            }
            
            objectQueue = [];
            refillObjects(15);
            drawStackDisplay();
        }


        function terminateMiniGame() {

            isGameRunning = false;

            clearInterval(gameTimerInterval);

            

            // 🚨 [정산 로직 변경] 점수 * 1.2

            let rewardMoney = Math.floor(score * 1.2);

            state.money = Number(state.money || 0) + rewardMoney;



            let existing = JSON.parse(localStorage.getItem(SAVE_KEY)) || {};

            let merged = { ...existing, money: state.money };

            localStorage.setItem(SAVE_KEY, JSON.stringify(merged));



            if (currentUser) {

                firebase.firestore().collection("users").doc(currentUser.uid).set(merged, { merge: true });

            }



            document.getElementById('start-curtain').innerHTML = `

                <div class="curtain-box">

                    <div class="curtain-title" style="color:#4ade80;">퇴근 시간!</div>

                    <div class="curtain-desc">

                        최종 스코어: <b>${score}점</b><br><br>

                        업무 성과급: <span style="color:#facc15; font-size:18px;">+${rewardMoney.toLocaleString()}원</span>

                    </div>

                    <button class="curtain-start-btn" onclick="location.reload()">한판 더 (100원)</button>

                    <button class="curtain-start-btn" style="background:#475569; margin-top:10px;" onclick="location.replace('game.html')">오락실 나가기</button>

                </div>

            `;

            document.getElementById('start-curtain').style.display = 'flex';

        }



        window.onload = () => {

            firebase.auth().onAuthStateChanged((user) => {

                if (user) {

                    currentUser = user;

                    firebase.firestore().collection("users").doc(user.uid).get().then((doc) => {

                        if (doc.exists) state.money = doc.data().money || 0;

                    });

                } else { location.href = 'index.html'; }

            });

        };
        // [추가] 캐릭터 배치 섞기 함수
        function shuffleTargets() {
            let all = [1, 2, 3, 4, 5, 6];
            // 배열 섞기
            all.sort(() => Math.random() - 0.5);
            // 왼쪽/오른쪽으로 분배
            leftTargets = [all[0], all[1], all[2]];
            rightTargets = [all[3], all[4], all[5]];
        }
        
    </script>

</body>

</html>
