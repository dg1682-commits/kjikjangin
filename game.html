<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 키우기 - 오락실</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-card: rgba(30, 21, 56, 0.85); 
            --neon-pink: #f43f5e;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-neon: #3b2d66;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: url('arcade/bg.png') no-repeat center center / cover;
            color: var(--text-light);
            overflow: hidden;
            touch-action: manipulation;
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: rgba(15, 10, 28, 0.85);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-neon);
            z-index: 100;
        }
        .back-btn { font-size: 22px; font-weight: bold; color: var(--neon-cyan); cursor: pointer; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-light); }
        .empty-space { width: 22px; }

        main { padding-top: 50px; height: 100%; display: flex; flex-direction: column; align-items: center; }

        .status-board {
            width: 92%; max-width: 400px; background: rgba(22, 15, 41, 0.9);
            border: 1.5px solid var(--neon-purple); box-shadow: 0 0 8px rgba(168, 85, 247, 0.2);
            border-radius: 10px; padding: 8px 12px; margin-top: 10px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(5px);
        }
        .board-info { display: flex; flex-direction: column; gap: 2px; }
        .board-label { font-size: 10px; color: var(--text-muted); font-weight: bold; }
        .board-val-time { font-size: 12px; font-weight: 700; color: var(--neon-cyan); }
        .board-val-money { font-size: 18px; font-weight: 900; color: #fbbf24; letter-spacing: -0.5px; }

        .carousel-container {
            width: 100%; flex-grow: 1; display: flex; align-items: center;
            position: relative; margin-top: 10px; overflow: hidden;
        }
        .carousel-track {
            display: flex; width: 100%; height: 320px;
            overflow-x: auto; overflow-y: hidden;
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
            padding-left: calc(50% - 120px);  
            padding-right: calc(50% - 120px);
        }
        .carousel-track::-webkit-scrollbar { display: none; } 

        .arcade-card {
            width: 240px; height: 300px; flex-shrink: 0;
            scroll-snap-align: center; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; border: none; 
            border-radius: 0; margin: 0 20px; transition: transform 0.3s;
            position: relative;
            cursor: pointer; 
        }

        .arcade-img {
            height: 240px; width: auto; object-fit: contain;
            -webkit-user-drag: none; user-select: none;
            transition: filter 0.3s, transform 0.3s;
            filter: drop-shadow(0 0 4px var(--neon-purple)) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .arcade-card.active .arcade-img {
            transform: scale(1.04);
            filter: drop-shadow(0 0 12px var(--neon-pink)) drop-shadow(0 0 4px var(--neon-pink)) drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        .indicator-dots { display: flex; gap: 8px; margin-bottom: 15px; }
        .dot { width: 8px; height: 8px; background: var(--border-neon); border-radius: 50%; transition: background 0.2s; }
        .dot.active { background: var(--neon-pink); box-shadow: 0 0 6px var(--neon-pink); }

        .launcher-panel {
            width: 100%; background: rgba(20, 13, 36, 0.9); border-top: 2px solid var(--border-neon);
            padding: 15px 30px; display: flex; flex-direction: column; align-items: center; gap: 6px;
            backdrop-filter: blur(10px);
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
        }
        .game-title { font-size: 19px; font-weight: 900; color: var(--text-light); }
        .game-cost { font-size: 13px; font-weight: 700; color: var(--neon-cyan); margin-bottom: 3px; }

        .coin-insert-btn {
            width: 100%; max-width: 320px; padding: 14px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            color: white; font-size: 15px; font-weight: 800; border-radius: 12px;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
            transition: transform 0.1s; cursor: pointer; text-align: center;
        }
        .coin-insert-btn:active { transform: scale(0.96); }

        .alert-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 21, 56, 0.95); padding: 25px; border-radius: 20px;
            width: 85%; max-width: 330px; z-index: 200; display: none; text-align: center;
            border: 2px solid var(--neon-purple); box-shadow: 0 0 25px rgba(168, 85, 247, 0.5);
            backdrop-filter: blur(10px);
        }
        .alert-title { font-size: 17px; font-weight: 800; margin-bottom: 12px; color: var(--neon-cyan); }
        .alert-desc { font-size: 14px; color: var(--text-light); margin-bottom: 22px; line-height: 1.5; font-weight: 500; }
        .alert-btn { background: var(--neon-pink); color: #fff; padding: 12px; width: 100%; border-radius: 10px; font-weight: 800; }

        /* 오락기 위에 점수 배지 */
        #best-score-display {
            position: absolute; 
            top: -40px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(244, 63, 94, 0.9); 
            color: #fff; 
            padding: 5px 12px; 
            border-radius: 20px;
            font-size: 14px; 
            font-weight: 800; 
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
            z-index: 99; 
            display: none; 
        }
    </style>
</head>
<body>

    <header>
        <a href="main.html" class="back-btn" onclick="goBack(event)">←</a>
        <div class="header-title">⚡ K-오락실 구역</div>
        <div class="empty-space"></div>
    </header>

    <main>
        <section class="status-board">
            <div class="board-info">
                <span class="board-label">인게임 표준 시간</span>
                <span class="board-val-time" id="game-date">0년 1월 1일 00:00</span>
            </div>
            <div class="board-info" style="align-items: flex-end;">
                <span class="board-label">소유 가용 현금</span>
                <span class="board-val-money" id="stat-money">0원</span>
            </div>
        </section>

        <section class="carousel-container">
            <div class="carousel-track" id="carousel-track" onscroll="trackScrollHandler()">
                <div class="arcade-card active" data-index="0" onclick="clickTargetGame(0)">
                    <div id="best-score-display">BEST: 0</div> 
                    <img src="arcade/game1.png" class="arcade-img" alt="game1">
                </div>
                <div class="arcade-card" data-index="1" onclick="clickTargetGame(1)">
                    <img src="arcade/game2.png" class="arcade-img" alt="game2">
                </div>
                <div class="arcade-card" data-index="2" onclick="clickTargetGame(2)">
                    <img src="arcade/game3.png" class="arcade-img" alt="game3">
                </div>
                <div class="arcade-card" data-index="3" onclick="clickTargetGame(3)">
                    <img src="arcade/game4.png" class="arcade-img" alt="game4">
                </div>
            </div>
        </section>

        <div class="indicator-dots" id="indicator-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <section class="launcher-panel">
            <div class="game-title" id="display-title">니꺼내꺼</div>
            <div class="game-cost" id="display-cost">1회 플레이: 100원</div>
            <button class="coin-insert-btn" onclick="insertCoinToPlay()">🪙 코인 넣고 게임 시작</button>
        </section>
    </main>

    <div class="alert-modal" id="alert-modal">
        <div class="alert-title" id="alert-title">알림</div>
        <div class="alert-desc" id="alert-desc">내용</div>
        <button class="alert-btn" onclick="closeAlert()">확인</button>
    </div>

    <script>
        const SAVE_KEY = "k_worker_tycoon_save_data";
        
        let state = {
            money: 10000000, stamina: 0, exp: 0, rankIdx: 0, condition: 100, maxCondition: 100, 
            houseIdx: 0, carIdx: -1, gameSeconds: 0, rentDayCounter: 0, isWorking: false, 
            currentTask: null, workElapsed: 0, debuffTimeLeft: 0, timeMult: 1.0, ownedItems: [], highScore: 0
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk",
            authDomain: "kkkjikjang.firebaseapp.com",
            projectId: "kkkjikjang",
            storageBucket: "kkkjikjang.firebasestorage.app",
            messagingSenderId: "138250223666",
            appId: "1:138250223666:web:997b7ed4572f717354fc2b"
        };
        firebase.initializeApp(firebaseConfig);
        let currentUser = null;
        let activeIndex = 0; 
        let isAutoScrolling = false; 

const ARCADE_GAMES = [
    { id: "LR", title: "니꺼내꺼", cost: 100, desc: "좌우 순발력 폭발! 성공 시 스코어 비례 두둑한 보너스 자금이 입금됩니다." },
    { id: "NC", title: "눈치눈치", cost: 1000, desc: "부장님 피해서 업무하세요! 성공 시 스코어 비례 보너스 자금이 입금됩니다." }, // 🚨 id를 "NC"로 수정
    { id: "rhythm", title: "리듬 테일즈 (리듬게임)", cost: 2000, desc: "화려한 콤보 달성 시 순발력(체력 스탯)이 영구 상승할 기회!" },
    { id: "lotto", title: "K-오락실 연금 대박 복권", cost: 5000, desc: "인생 역전의 기회! 초고액의 현금 자산 당첨 스케줄 시뮬레이션." }
];

        // 🚨 오락실 무결성 수치 클리닝 정제 처리
        function sanitizeState() {
            state.money = isNaN(Number(state.money)) ? 10000000 : Number(state.money);
            state.stamina = isNaN(Number(state.stamina)) ? 0 : Number(state.stamina);
            state.exp = isNaN(Number(state.exp)) ? 0 : Number(state.exp);
            state.rankIdx = isNaN(Number(state.rankIdx)) ? 0 : Number(state.rankIdx);
            state.condition = isNaN(Number(state.condition)) ? 100 : Number(state.condition);
            state.maxCondition = isNaN(Number(state.maxCondition)) ? 100 : Number(state.maxCondition);
            state.gameSeconds = isNaN(Number(state.gameSeconds)) ? 0 : Number(state.gameSeconds);
            state.highScore = isNaN(Number(state.highScore)) ? 0 : Number(state.highScore);
        }

        function saveGame() { 
            sanitizeState();
            let existing = JSON.parse(localStorage.getItem(SAVE_KEY)) || {};
            let merged = { ...existing, ...state }; 
            localStorage.setItem(SAVE_KEY, JSON.stringify(merged)); 

            if (currentUser) {
                firebase.firestore().collection("users").doc(currentUser.uid).set(merged, { merge: true })
                    .catch(e => console.error("오락실 클라우드 백업 전송 실패:", e));
            }
        }

        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if(saved) {
                try {
                    let parsed = JSON.parse(saved);
                    state = { ...state, ...parsed };
                } catch(e) { console.error(e); }
            }
            sanitizeState();
        }

        function getIncomeMultiplier(s) { return s <= 10000 ? Math.pow(1.0002, s) : 7.38 + ((s - 10000) * 0.0005); }

        function updateDisplay() {
            sanitizeState();
            const totalMin = Math.floor(state.gameSeconds / 60);
            const y = Math.floor(totalMin / (60 * 24 * 30 * 12));
            const m = Math.floor(totalMin / (60 * 24 * 30)) % 12;
            const d = Math.floor(totalMin / (60 * 24)) % 30;
            const h = Math.floor(totalMin / 60) % 24;
            
            document.getElementById('game-date').innerText = `${y}년 ${m+1}월 ${d+1}일 ${String(h).padStart(2,'0')}:00`;
            document.getElementById('stat-money').innerText = Math.floor(state.money).toLocaleString() + "원";
        }

        function clickTargetGame(idx) {
            if (activeIndex === idx) return; 
            isAutoScrolling = true;
            const track = document.getElementById('carousel-track');
            const cardWidth = 280; 
            
            track.scrollLeft = idx * cardWidth;
            syncArcadeSelection(idx);
            
            setTimeout(() => { isAutoScrolling = false; }, 350);
        }

        function trackScrollHandler() {
            if (isAutoScrolling) return; 
            const track = document.getElementById('carousel-track');
            let cardWidth = 280; 
            let scrollLeft = track.scrollLeft;
            
            let index = Math.round(scrollLeft / cardWidth);
            if(index < 0) index = 0;
            if(index > 3) index = 3;
            
            if (activeIndex !== index) {
                syncArcadeSelection(index);
            }
        }

        function syncArcadeSelection(index) {
            activeIndex = index;
            const cards = document.querySelectorAll('.arcade-card');
            const dots = document.querySelectorAll('.dot');
            const bestScoreEl = document.getElementById('best-score-display');
            
            cards.forEach((c, i) => {
                if (i === activeIndex) c.classList.add('active');
                else c.classList.remove('active');
            });
            
            dots.forEach((d, i) => {
                if (i === activeIndex) d.classList.add('active');
                else d.classList.remove('active');
            });

            if (index === 0) {
                if(bestScoreEl) bestScoreEl.style.display = 'block';
            } else {
                if(bestScoreEl) bestScoreEl.style.display = 'none';
            }
            
            document.getElementById('display-title').innerText = ARCADE_GAMES[activeIndex].title;
            document.getElementById('display-cost').innerText = `1회 플레이: ${ARCADE_GAMES[activeIndex].cost.toLocaleString()}원`;
        }

        function insertCoinToPlay() {
            let game = ARCADE_GAMES[activeIndex];
            if (state.money < game.cost) {
                return showAlert("지갑 확인 필요", "코인을 넣기 위한 현금이 부족합니다.\n사무실에서 열심히 일하거나 주식으로 돈을 더 벌어오세요!");
            }

if (game.id === "LR") {
        state.money -= game.cost;
        saveGame(); 
        location.replace('LR.html');
    } else if (game.id === "NC") { // 🚨 이 부분을 추가하세요
        state.money -= game.cost;
        saveGame(); 
        location.replace('NC.html'); // NC.html로 이동
    } else {
                showAlert("🚧 기기 점검 중 (공사 중)", `[${game.title}] 기기는 현재 기기 고유 연동 시스템 공사 중입니다!\n\n실제 미니게임이 가동되는 다음 패치 버전부터 코인이 정상 차감되오니 안심하고 구경해 주세요!`);
            }
        }

        function startGameLoop() {
            setInterval(() => {
                state.gameSeconds += 108; 
                let mult = getIncomeMultiplier(state.stamina);
                let passiveAdd = (0.5 * mult) * 0.2;
                if (!isNaN(passiveAdd)) state.money = Number(state.money) + passiveAdd;
                updateDisplay();
            }, 200);
        }

        function showAlert(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            document.getElementById('alert-modal').style.display = 'block';
        }
        function closeAlert() { document.getElementById('alert-modal').style.display = 'none'; }

        function goBack(e) {
            e.preventDefault();
            location.replace('main.html'); 
        }

        // 🚨 [패치 완료] 인증 완료 시점에 확실하게 UI를 전면 로드하고 루프를 가동
        window.onload = () => {
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    firebase.firestore().collection("users").doc(user.uid).get().then((doc) => {
                        loadGame(); // 로컬 데이터 우선 동기화 뼈대 주입
                        if (doc.exists) {
                            let cloudData = doc.data();
                            if(cloudData.money !== undefined) state.money = Number(cloudData.money);
                            if(cloudData.highScore !== undefined) state.highScore = Number(cloudData.highScore);
                            if(cloudData.gameSeconds !== undefined) state.gameSeconds = Number(cloudData.gameSeconds);
                            if(cloudData.stamina !== undefined) state.stamina = Number(cloudData.stamina);
                            if(cloudData.exp !== undefined) state.exp = Number(cloudData.exp);
                            if(cloudData.rankIdx !== undefined) state.rankIdx = Number(cloudData.rankIdx);

                            localStorage.setItem(SAVE_KEY, JSON.stringify(state));
                        }
                        
                        // 🚨 [핵심 수정] 로드 성공 후 UI 요소 주입 및 화면 정밀 동기화 기동
                        const bestScoreEl = document.getElementById('best-score-display');
                        if (bestScoreEl) bestScoreEl.innerText = "BEST: " + state.highScore;
                        
                        updateDisplay();
                        syncArcadeSelection(0); 
                        startGameLoop();
                    }).catch((err) => {
                        console.error("Firestore 로드 장해 우회 구동:", err);
                        loadGame();
                        updateDisplay();
                        syncArcadeSelection(0);
                        startGameLoop();
                    });
                } else { 
                    // 로그인 세션 소실 시에만 안전하게 가이드 후 인덱스로 전환
                    location.replace('index.html'); 
                }
            });
        };
    </script>
</body>
</html>
