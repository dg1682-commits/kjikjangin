<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1955 - 오락실 미니게임</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg-color: #05070f;
            --card-bg: #111625;
            --neon-cyan: #06b6d4;
            --neon-pink: #f43f5e;
            --text-light: #f1f5f9;
            --text-muted: #64748b;
            --border-neon: #221a42;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            overflow: hidden;
            touch-action: none; 
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: rgba(15, 10, 28, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-neon);
            z-index: 100;
        }
        .back-btn { font-size: 22px; font-weight: bold; color: var(--neon-cyan); cursor: pointer; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 800; color: var(--text-light); letter-spacing: -0.5px; }
        .empty-space { width: 22px; }

        main { padding-top: 50px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }

        .score-container {
            width: 95%; max-width: 440px; display: flex; justify-content: space-between;
            background: rgba(22, 15, 41, 0.8); border: 1px solid var(--border-neon);
            padding: 10px 15px; margin-top: 10px; border-radius: 8px; box-sizing: border-box;
        }
        .score-box { display: flex; flex-direction: column; text-align: left; }
        .score-box.right { text-align: right; }
        .score-label { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .score-val { font-size: 18px; font-weight: 900; color: var(--neon-cyan); }
        .score-val.best { color: #10b981; }

        .game-viewport {
            width: 95%; max-width: 440px; flex-grow: 1;
            margin-top: 10px; margin-bottom: 20px;
            background: #000;
            border: 2px solid var(--border-neon); border-radius: 16px;
            box-shadow: 0 0 20px rgba(34, 26, 66, 0.4);
            position: relative; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        .guide-banner { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 12px; color: rgba(6, 182, 212, 0.7); font-weight: bold; pointer-events: none; animation: blink 1.5s infinite alternate; text-shadow: 0 0 5px rgba(0,0,0,0.8); }
        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 7, 15, 0.93); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 30px 25px; border-radius: 20px; border: 3px solid var(--neon-pink); width: 85%; max-width: 330px; text-align: center; box-shadow: 0 0 30px rgba(244, 63, 94, 0.4); }
        .modal-title { font-size: 24px; color: var(--neon-pink); font-weight: 900; margin-top: 0; margin-bottom: 15px; }
        .result-box { background: rgba(0,0,0,0.3); border-left: 3px solid var(--neon-pink); padding: 12px; border-radius: 8px; text-align: left; font-size: 15px; line-height: 1.6; margin-bottom: 20px; font-weight: 600; color: #cbd5e1; }
        .modal-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 800; border-radius: 10px; margin: 8px 0; border: none; cursor: pointer; font-family: 'Pretendard', sans-serif; }
        .modal-btn.retry { background: linear-gradient(135deg, var(--neon-cyan), #0369a1); color: white; }
        .modal-btn.exit { background: #334155; color: var(--text-light); }
    </style>
</head>
<body>

    <header>
        <a href="game.html" class="back-btn">←</a>
        <div class="header-title">🛩️ 클래식 스트라이커 1955</div>
        <div class="empty-space"></div>
    </header>

    <main>
        <section class="score-container">
            <div class="score-box">
                <span class="score-label">CURRENT SCORE</span>
                <span class="score-val" id="current-score">0</span>
            </div>
            <div class="score-box right">
                <span class="score-label">BEST RECORD</span>
                <span class="score-val best" id="best-score">0</span>
            </div>
        </section>

        <section class="game-viewport" id="viewport-container">
            <canvas id="game-canvas"></canvas>
            <div class="guide-banner">↔️ 화면을 드래그하여 적 기체와 화염을 피하세요!</div>
        </section>
    </main>

    <div id="gameover-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">💥(GAME OVER)</h2>
            <div class="result-box" id="result-box"></div>
            <button class="modal-btn retry" onclick="resetEngineToRetry()">재시작 (100원)</button>
            <button class="modal-btn exit" onclick="location.replace('game.html')">오락실 나가기</button>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDr6T_3ZCMMeWasorTJrrcfwnNaPi38TXk", authDomain: "kkkjikjang.firebaseapp.com", projectId: "kkkjikjang", storageBucket: "kkkjikjang.firebasestorage.app", messagingSenderId: "138250223666", appId: "1:138250223666:web:997b7ed4572f717354fc2b" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // 🚨 [전역 변수 오류 해결] 전역 상태 감시용 라이브 통제 플래그 안전 선언
    let currentUser = null, highScore1955 = 0;
    let gameActive = true;
    let bossTimerRef = null;

    firebase.auth().onAuthStateChanged(user => { 
        if (user) { 
            currentUser = user; 
            db.collection("users").doc(user.uid).get().then(doc => { 
                if(doc.exists) { 
                    highScore1955 = doc.data().highScore_1955 || 0; 
                    document.getElementById('best-score').innerText = highScore1955.toLocaleString(); 
                } 
            }); 
        } 
    });

    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('viewport-container');

    let canvasWidth = 400;
    let canvasHeight = 600;

    const bgImg = new Image();       bgImg.src = 'arcade/1955/1955bg.png';
    const playerImg = new Image();   playerImg.src = 'arcade/1955/user.png';
    const asteroidImg = new Image(); asteroidImg.src = 'arcade/1955/asteroid.png';
    const bulletImg = new Image();   bulletImg.src = 'arcade/1955/bullet.png';
    const missileImg = new Image();  missileImg.src = 'arcade/1955/missile.png';

    let bgY = 0;         
    let bgSpeed = 1.8;   

    function resizeCanvas() {
        canvasWidth = container.clientWidth;
        canvasHeight = container.clientHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        
        if(player) {
            player.y = canvasHeight - 80; 
            player.targetX = canvasWidth / 2;
            player.x = canvasWidth / 2;
        }
    }

    let player = {
        x: 200,
        y: 530,
        size: 26,       
        targetX: 200,
        speedFactor: 0.18 
    };

    let entities = []; 
    let score = 0;
    let isGameOver = false;
    let spawnTimer = 0;

    function handlePointerMove(e) {
        if (isGameOver) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
        }
        let relativeX = clientX - rect.left;
        player.targetX = Math.max(player.size, Math.min(canvasWidth - player.size, relativeX));
    }

    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('touchmove', handlePointerMove, { passive: false });
    window.addEventListener('mousedown', handlePointerMove);
    window.addEventListener('touchstart', handlePointerMove, { passive: false });

    function spawnEnemyEntity() {
        if (!gameActive || isGameOver) return;
        const types = ['asteroid', 'missile', 'bullet'];
        const chosenType = types[Math.floor(Math.random() * types.length)];
        
        let size = 15;
        let speed = Math.random() * 3 + 2;
        
        if(chosenType === 'asteroid') {
            size = Math.random() * 15 + 15; 
            speed = Math.random() * 1.2 + 1.3;
        } else if(chosenType === 'bullet') {
            size = 12; 
            speed = Math.random() * 3 + 4.5; 
        } else if(chosenType === 'missile') {
            size = 16;
            speed = Math.random() * 2 + 3.2;
        }

        entities.push({
            x: Math.random() * (canvasWidth - size * 2) + size,
            y: -60,
            size: size,
            speed: speed,
            type: chosenType
        });
    }

    function updateEngineLoop() {
        if (isGameOver) return;

        bgY += bgSpeed;
        if (bgY >= canvasHeight) {
            bgY = 0;
        }

        let dx = player.targetX - player.x;
        player.x += dx * player.speedFactor;

        spawnTimer++;
        if (spawnTimer > Math.max(12, 38 - Math.floor(score / 50))) {
            spawnEnemyEntity();
            spawnTimer = 0;
            score += 2; 
            document.getElementById('current-score').innerText = score;
        }

        for (let i = entities.length - 1; i >= 0; i--) {
            let ent = entities[i];
            ent.y += ent.speed;

            if (ent.y > canvasHeight + 60) {
                entities.splice(i, 1);
                continue;
            }

            let distDX = ent.x - player.x;
            let distDY = ent.y - player.y;
            let distance = Math.sqrt(distDX * distDX + distDY * distDY);

            if (distance < (player.size * 0.75) + (ent.size * 0.8)) {
                triggerPlayerGameOver();
                return;
            }
        }

        renderGraphicsGraphics();
        requestAnimationFrame(updateEngineLoop);
    }

    function renderGraphicsGraphics() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);

        ctx.drawImage(bgImg, 0, bgY, canvasWidth, canvasHeight);
        ctx.drawImage(bgImg, 0, bgY - canvasHeight, canvasWidth, canvasHeight);

        entities.forEach(ent => {
            if (ent.type === 'asteroid') {
                ctx.drawImage(asteroidImg, ent.x - ent.size, ent.y - ent.size, ent.size * 2, ent.size * 2);
            } 
            else if (ent.type === 'bullet') {
                ctx.drawImage(bulletImg, ent.x - ent.size, ent.y - ent.size, ent.size * 2, ent.size * 2);
            } 
            else if (ent.type === 'missile') {
                let mWidth = ent.size * 1.2;
                let mHeight = ent.size * 2.6;
                ctx.drawImage(missileImg, ent.x - (mWidth / 2), ent.y - (mHeight / 2), mWidth, mHeight);
            }
        });

        ctx.drawImage(playerImg, player.x - player.size, player.y - player.size, player.size * 2, player.size * 2);
    }

    function triggerPlayerGameOver() {
        isGameOver = true;
        gameActive = false;

        // 🚨 [밸런스 패치] 정산 효율을 주임님께서 지시하신 점수 * 1.2배 정속으로 수정
        const earnings = Math.floor(score * 1.2); 
        
        // 🚨 [버그 완치] 태그 바인딩 타깃 ID를 'result-box'로 긴급 교체하여 전산 충돌 완벽 방어!
        document.getElementById('result-box').innerText = `최종 비행 점수: ${score}점\n💰 오락실 정산 수당: +${earnings.toLocaleString()}원`;
        document.getElementById('gameover-modal').style.display = 'flex';

        if (score > 0 && currentUser) {
            db.collection("users").doc(currentUser.uid).get().then(doc => {
                if (doc.exists) {
                    const currentMoney = Number(doc.data().money || 0);
                    let updatePayload = { money: currentMoney + earnings };
                    
                    if (score > highScore1955) {
                        highScore1955 = score;
                        document.getElementById('best-score').innerText = highScore1955.toLocaleString();
                        updatePayload.highScore_1955 = highScore1955;
                    }
                    
                    db.collection("users").doc(currentUser.uid).update(updatePayload);
                }
            });
        }
    }

    function resetEngineToRetry() {
        if (!currentUser) return;
        
        db.collection("users").doc(currentUser.uid).get().then(doc => {
            const money = Number(doc.data().money || 0);
            if (money >= 100) {
                db.collection("users").doc(currentUser.uid).update({ money: money - 100 });
                document.getElementById('gameover-modal').style.display = 'none';
                
                score = 0;
                document.getElementById('current-score').innerText = score;
                entities = [];
                spawnTimer = 0;
                isGameOver = false;
                gameActive = true;
                
                player.x = canvasWidth / 2;
                player.targetX = canvasWidth / 2;
                
                updateEngineLoop();
            } else {
                alert("가용 현금이 부족합니다! (100원 필요)");
            }
        });
    }

    window.addEventListener('resize', resizeCanvas);
    
    resizeCanvas();
    setTimeout(() => {
        updateEngineLoop();
    }, 500);
</script>
</body>
</html>
